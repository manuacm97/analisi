<style>

<script>
/* ── STATE ── */
var SK = 'as_v4';
var COMPS = [
  {id:'camp',l:'🏆 Campionato',d:'Forma 30% · Posizione 25% · Attacco 20% · Difesa 15% · Momentum 10%'},
  {id:'coppa',l:'🥇 Coppa Nazionale',d:'Forma 40% · Posizione 5% · Attacco 25% · Difesa 15% · Momentum 15%'},
  {id:'euro',l:'🌍 Europa / Internazionale',d:'Forma 35% · Attacco 25% · Difesa 20% · Momentum 20% — posizione non rilevante'},
  {id:'amich',l:'🤝 Amichevole',d:'Analisi indicativa — alta incertezza. Considera rotazioni e motivazione.'}
];
var W = {
  camp:{f:.30,p:.25,a:.20,d:.15,m:.10},
  coppa:{f:.40,p:.05,a:.25,d:.15,m:.15},
  euro:{f:.35,p:0,a:.25,d:.20,m:.20},
  amich:{f:.20,p:0,a:.20,d:.20,m:.10}
};

function emptyM(){var r=[];for(var i=0;i<6;i++)r.push({avv:'',gf:0,gs:0,ct:'C',posAvv:0});return r;}
function defS(){return{
  tA:{name:'',pos:0,tot:20,comp:'camp',matches:emptyM(),mode:'testo'},
  tB:{name:'',pos:0,tot:20,comp:'camp',matches:emptyM(),mode:'testo'},
  standings:{},tot:20
};}
var S=defS(), AN=null, STOR=[];
var AT='input';


function load(){try{var d=localStorage.getItem(SK);if(d){var p=JSON.parse(d);S=p.s||defS();AN=p.a||null;STOR=p.h||[];}}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify({s:S,a:AN,h:STOR}));}catch(e){}}

function go(t){
  var ts=document.querySelectorAll('.tab'),bs=document.querySelectorAll('.nb');
  for(var i=0;i<ts.length;i++)ts[i].classList.remove('on');
  for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');
  document.getElementById('tab-'+t).classList.add('on');
  document.querySelector('.nb[data-t="'+t+'"]').classList.add('on');
  AT=t;draw();
}

/* ── CLAUDE VISION API (gratuita in claude.ai) ── */
function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){res(e.target.result.split(',')[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function analyzeImageResults(file,setMsg){
  if(setMsg)setMsg('Analisi immagine...');
  var b64=await fileToBase64(file);
  var mime=file.type||'image/jpeg';
  var prompt='Questo è uno screenshot di risultati calcistici (da Flashscore, SofaScore, Diretta.it o simili).\nIdentifica la squadra principale e i suoi ULTIMI RISULTATI (max 6, dal più recente al meno recente).\nRispondi SOLO con questo JSON valido, nessun altro testo:\n{"name":"nome squadra principale","matches":[{"avv":"nome avversario","gf":N,"gs":N,"ct":"C oppure T"}]}\ngf=gol FATTI dalla squadra principale, gs=gol SUBITI. ct=C se giocava in casa, T se in trasferta.';
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:600,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:prompt}
      ]}]
    })
  });
  if(!resp.ok){var e=await resp.json();throw new Error((e.error&&e.error.message)||'Errore API '+resp.status);}
  var data=await resp.json();
  var txt=(data.content[0]&&data.content[0].text)||'';
  var clean=txt.replace(/```json\n?|```/g,'').trim();
  return JSON.parse(clean);
}

async function analyzeImageStandings(file,setMsg){
  if(setMsg)setMsg('Analisi classifica...');
  var b64=await fileToBase64(file);
  var mime=file.type||'image/jpeg';
  var prompt='Questo è uno screenshot di una classifica calcistica.\nEstrai posizione e nome di TUTTE le squadre visibili.\nRispondi SOLO con questo JSON valido, nessun altro testo:\n{"teams":[{"pos":N,"name":"nome squadra"}]}\nOrdina per posizione crescente.';
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:800,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:prompt}
      ]}]
    })
  });
  if(!resp.ok){var e=await resp.json();throw new Error((e.error&&e.error.message)||'Errore API '+resp.status);}
  var data=await resp.json();
  var txt=(data.content[0]&&data.content[0].text)||'';
  var clean=txt.replace(/```json\n?|```/g,'').trim();
  return JSON.parse(clean);
}

/* ── PARSER 7-RIGHE (originale) ── */
function parse7Lines(text){
  var righe=text.split('\n').filter(function(l){return l.trim();}).map(function(l){return l.trim();});
  var RPP=7;
  if(righe.length<RPP)return{error:'Testo troppo corto (servono multipli di 7 righe per partita)'};

  // Conta frequenza squadre (riga 3 e 4 di ogni blocco)
  var freq={};
  for(var i=0;i+RPP-1<righe.length;i+=RPP){
    var s1=righe[i+2],s2=righe[i+3];
    freq[s1]=(freq[s1]||0)+1;
    freq[s2]=(freq[s2]||0)+1;
  }
  var nPartite=Math.floor(righe.length/RPP);
  // La squadra principale appare in TUTTE le partite
  var nomeSq=null;
  for(var k in freq){if(freq[k]===nPartite){nomeSq=k;break;}}
  // Se non trovata esatta, prendi quella più frequente
  if(!nomeSq){
    var maxF=0;
    for(var k in freq){if(freq[k]>maxF){maxF=freq[k];nomeSq=k;}}
  }
  if(!nomeSq)return{error:'Squadra principale non rilevata'};

  var matches=[];
  for(var i=0;i+RPP-1<righe.length&&matches.length<6;i+=RPP){
    var sq1=righe[i+2],sq2=righe[i+3];
    var gCasa=parseInt(righe[i+4])||0,gTrasf=parseInt(righe[i+5])||0;
    var isCasa=(sq1===nomeSq);
    var avv=isCasa?sq2:sq1;
    var gf=isCasa?gCasa:gTrasf,gs=isCasa?gTrasf:gCasa;
    var ct=isCasa?'C':'T';
    matches.push({avv:avv,gf:gf,gs:gs,ct:ct,posAvv:0});
  }
  return{name:nomeSq,matches:matches};
}

/* ── OCR TEXT PARSER (risultati da immagine) ── */
function parseOCRResults(text,existingName){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
  var scoreRe=/\b(\d{1,2})\s*[-:]\s*(\d{1,2})\b/;
  var matches=[];
  var tName=(existingName||'').toLowerCase();

  for(var i=0;i<lines.length&&matches.length<6;i++){
    var l=lines[i];
    var sm=l.match(scoreRe);
    if(!sm)continue;
    var g1=parseInt(sm[1]),g2=parseInt(sm[2]);
    var prev=lines[i-1]||'',next=lines[i+1]||'';
    var avv='',ct='C',gf=g1,gs=g2;
    var ctx=(prev+' '+l+' '+next).toLowerCase();
    if(tName&&ctx.indexOf(tName.slice(0,4))>=0){
      var lpos=ctx.indexOf(tName.slice(0,4));
      var spos=ctx.indexOf(sm[0]);
      ct=lpos<spos?'C':'T';
      if(ct==='T'){gf=g2;gs=g1;}
      var opp=prev.length>1&&prev.toLowerCase().indexOf(tName.slice(0,4))<0?prev:next;
      avv=opp.replace(/[^\w\s]/g,'').trim().slice(0,25);
    } else {
      avv=(next.length>2&&!/^\d/.test(next))?next.trim().slice(0,25):(prev.length>2&&!/^\d/.test(prev))?prev.trim().slice(0,25):'Avversario';
    }
    if(avv.length<2)avv='Avversario '+(matches.length+1);
    matches.push({avv:avv,gf:gf,gs:gs,ct:ct,posAvv:0});
  }
  return matches;
}

/* ── OCR STANDINGS PARSER ── */
function parseOCRStandings(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
  var result={};var maxPos=0;
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    // Pattern: numero seguito da nome squadra (vari formati)
    var m=l.match(/^(\d{1,2})\s*[.)\-]?\s+([A-Za-z\u00C0-\u024F][A-Za-z\u00C0-\u024F\s'.-]{1,25})/);
    if(m){
      var pos=parseInt(m[1]);
      var name=m[2].trim().split(/\s{2,}|\t/)[0].trim();
      // Rimuovi numeri alla fine (statistiche)
      name=name.replace(/\s+\d+.*$/,'').trim();
      if(pos>0&&pos<=50&&name.length>1&&name.length<25){
        result[name.toLowerCase()]=pos;
        if(pos>maxPos)maxPos=pos;
      }
    }
  }
  return{standings:result,total:maxPos||20};
}

function findPos(name,standings){
  if(!name||!standings)return 0;
  var low=name.toLowerCase().trim();
  if(standings[low])return standings[low];
  var keys=Object.keys(standings);
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    if(low.length>=4&&k.indexOf(low.slice(0,4))>=0)return standings[k];
    if(k.length>=4&&low.indexOf(k.slice(0,4))>=0)return standings[k];
  }
  return 0;
}

/* ── OCR HANDLERS ── */
async function handleOCRResults(file,team){
  var loadId='ocrL'+team,errId='ocrE'+team;
  var ld=document.getElementById(loadId),er=document.getElementById(errId);
  if(ld)ld.classList.add('show');
  if(er)er.style.display='none';
  try{

function applyStandingsToTeam(team){
  if(!Object.keys(S.standings).length)return;
  for(var i=0;i<team.matches.length;i++)
    if(team.matches[i].avv)team.matches[i].posAvv=findPos(team.matches[i].avv,S.standings)||0;
  team.tot=S.tot;
  if(team.name&&!team.pos)team.pos=findPos(team.name,S.standings)||0;
}

/* ── MATH ENGINE ── */
function poisson(L,k){if(L<=0)return k===0?1:0;var r=Math.exp(-L);for(var i=1;i<=k;i++)r*=L/i;return r;}
function mediaPesata(v){var w=[1.0,.9,.8,.7,.6,.5],sv=0,sw=0;for(var i=0;i<v.length&&i<w.length;i++){sv+=v[i]*w[i];sw+=w[i];}return sw?sv/sw:0;}
function momentum(gf,gs){
  var rec=0,old=0;
  for(var i=0;i<3;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;rec+=p;}
  for(var i=3;i<6;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;old+=p;}
  return old===0?(rec>0?100:0):(rec-old)/old*100;
}
function calcSoS(posAvv,tot){
  var valid=posAvv.filter(function(p){return p>0&&p<=tot;});
  if(!valid.length)return{sos:.5,comp:0};
  var med=valid.reduce(function(a,b){return a+b;},0)/valid.length;
  return{sos:med/tot,comp:valid.length/6};
}
function calc1X2(xA,xB){
  var p1=0,pX=0,p2=0;
  for(var i=0;i<=7;i++)for(var j=0;j<=7;j++){var p=poisson(xA,i)*poisson(xB,j);if(i>j)p1+=p;else if(i===j)pX+=p;else p2+=p;}
  var t=p1+pX+p2;return t?{p1:p1/t*100,pX:pX/t*100,p2:p2/t*100}:{p1:33,pX:33,p2:34};
}
function calcRange(xA,xB,lo,hi){var p=0;for(var i=0;i<=9;i++)for(var j=0;j<=9;j++)if(i+j>=lo&&i+j<=hi)p+=poisson(xA,i)*poisson(xB,j);return p*100;}
function calcGoals(xA,xB){
  var t=xA+xB;
  return{
    o05:(1-poisson(t,0))*100,o15:(1-poisson(t,0)-poisson(t,1))*100,
    o25:(1-poisson(t,0)-poisson(t,1)-poisson(t,2))*100,
    o35:(1-poisson(t,0)-poisson(t,1)-poisson(t,2)-poisson(t,3))*100,
    u05:poisson(t,0)*100,u15:(poisson(t,0)+poisson(t,1))*100,
    btts:(1-poisson(xA,0))*(1-poisson(xB,0))*100,
    nobtts:(1-(1-poisson(xA,0))*(1-poisson(xB,0)))*100
  };
}
function calcCS(xA,xB){
  var sc=[];
  for(var i=0;i<=5;i++)for(var j=0;j<=5;j++)sc.push({s:i+'-'+j,p:poisson(xA,i)*poisson(xB,j)*100,w:i>j?'A':i<j?'B':'X'});
  sc.sort(function(a,b){return b.p-a.p;});return sc.slice(0,8);
}

function analyzeTeam(t){
  var m=t.matches,gf=[],gs=[],ct=[],posAvv=[];
  for(var i=0;i<m.length;i++){gf.push(m[i].gf);gs.push(m[i].gs);ct.push(m[i].ct);posAvv.push(m[i].posAvv);}
  var V=0,P=0;for(var i=0;i<gf.length;i++){if(gf[i]>gs[i])V++;else if(gf[i]===gs[i])P++;}
  var L=6-V-P,pts=V*3+P;
  var iC=[],iT=[];for(var i=0;i<ct.length;i++){ct[i]==='C'?iC.push(i):iT.push(i);}
  var avg=function(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:0;};
  var gfC=iC.map(function(i){return gf[i];}),gsC=iC.map(function(i){return gs[i];});
  var gfT=iT.map(function(i){return gf[i];}),gsT=iT.map(function(i){return gs[i];});
  var mgfP=mediaPesata(gf),mgsP=mediaPesata(gs);
  var mom=momentum(gf,gs);
  var sos=calcSoS(posAvv,t.tot||20);
  var cleanS=0;for(var i=0;i<gs.length;i++)if(gs[i]===0)cleanS++;
  var bttsH=0;for(var i=0;i<gf.length;i++)if(gf[i]>0&&gs[i]>0)bttsH++;
  var o25H=0;for(var i=0;i<gf.length;i++)if(gf[i]+gs[i]>2)o25H++;
  // Score
  var posN=t.pos>0&&t.tot>1?1-(t.pos-1)/(t.tot-1):.5;
  var w=W[t.comp]||W.camp;
  var score=(pts/18)*w.f+posN*w.p+(mgfP/3)*w.a+(1-mgsP/3)*w.d+((mom+100)/200)*w.m;
  if(sos.comp>.5)score+=(1-sos.sos)*.05;
  score=Math.max(0,Math.min(1,score));
  if(t.comp==='amich')score=score*.7+.15;
  // Confidence
  var varGol=0,mGol=avg(gf);
  for(var i=0;i<gf.length;i++)varGol+=(gf[i]-mGol)*(gf[i]-mGol);
  varGol/=Math.max(gf.length,1);
  var cf=50;if(varGol<1)cf+=15;else if(varGol>3)cf-=15;
  cf+=sos.comp*20;cf+=Math.abs(mom)>50?15:Math.abs(mom)>20?8:0;
  cf+=Math.min(iC.length,iT.length)*2;
  cf=Math.max(0,Math.min(100,Math.round(cf)));
  var esiti=[];for(var i=0;i<gf.length;i++)esiti.push(gf[i]>gs[i]?'V':gf[i]===gs[i]?'P':'S');
  return{V:V,P:P,L:L,pts:pts,gf:gf,gs:gs,ct:ct,posAvv:posAvv,
    mgfP:mgfP,mgsP:mgsP,agf:avg(gf),ags:avg(gs),
    agfC:avg(gfC),agsC:avg(gsC),agfT:avg(gfT),agsT:avg(gsT),
    mom:mom,sos:sos,score:score,conf:cf,cleanS:cleanS,bttsH:bttsH,o25H:o25H,esiti:esiti,
    matches:m,iC:iC,iT:iT,pos:t.pos,tot:t.tot};
}

function runAnalysis(){
  var a=analyzeTeam(S.tA),b=analyzeTeam(S.tB);
  var nA=S.tA.name||'Casa',nB=S.tB.name||'Trasferta';
  var sosAdjA=a.sos.comp>.5?(1+(1-a.sos.sos)*.3):1;
  var sosAdjB=b.sos.comp>.5?(1+(1-b.sos.sos)*.3):1;
  // xG: attacco casa vs difesa trasferta
  var xA=Math.max(.15,(a.agfC||a.mgfP)*.6+(b.agsT||b.mgsP)*.4)*sosAdjA;
  var xB=Math.max(.15,(b.agfT||b.mgfP)*.6+(a.agsC||a.mgsP)*.4)*sosAdjB;
  var probs=calc1X2(xA,xB),goals=calcGoals(xA,xB);
  // Blended Over/BTTS
  var o25b=goals.o25*.65+(a.o25H+b.o25H)/12*100*.35;
  var bttsb=goals.btts*.65+(a.bttsH+b.bttsH)/12*100*.35;
  var dc1X=probs.p1+probs.pX,dcX2=probs.p2+probs.pX,dc12=probs.p1+probs.p2;
  var cM=Math.round((a.conf+b.conf)/2),cL=cM>=70?'H':cM>=45?'M':'L';
  var mO=probs.p1>=probs.pX&&probs.p1>=probs.p2?'1':probs.pX>=probs.p2?'X':'2';
  var mP=mO==='1'?probs.p1:mO==='X'?probs.pX:probs.p2;
  var cs=calcCS(xA,xB);
  // Multigol
  var mg=[];
  var ranges=[[0,1],[1,2],[2,3],[0,2],[1,3],[2,4],[3,5],[4,6]];
  for(var i=0;i<ranges.length;i++)mg.push({r:ranges[i][0]+'-'+ranges[i][1],p:calcRange(xA,xB,ranges[i][0],ranges[i][1])});
  // Gol per squadra
  var tgA05=(1-poisson(xA,0))*100,tgA15=(1-poisson(xA,0)-poisson(xA,1))*100;
  var tgB05=(1-poisson(xB,0))*100,tgB15=(1-poisson(xB,0)-poisson(xB,1))*100;
  var now=new Date();
  var ts=now.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  AN={nA:nA,nB:nB,a:a,b:b,xA:xA,xB:xB,probs:probs,goals:goals,
    o25b:o25b,bttsb:bttsb,dc1X:dc1X,dcX2:dcX2,dc12:dc12,
    cM:cM,cL:cL,mO:mO,mP:mP.toFixed(0),mQ:(100/mP).toFixed(2),cs:cs,mg:mg,
    tgA05:tgA05,tgA15:tgA15,tgB05:tgB05,tgB15:tgB15,
    comp:S.tA.comp,ts:ts};
  save();go('analisi');
}

  for(var i=0;i<6;i++)if(S.tA.matches[i].avv)hA=true;

  if(!hA&&!hB){alert('Importa i risultati di almeno una squadra');return;}
  runAnalysis();
}

function buildInsights(d){
  var ins=[];
  if(d.probs.p1>70&&d.a.score>d.b.score+.12)ins.push({ico:'💎',txt:'<strong>Value Bet 1 ('+d.nA+')</strong>: '+f1(d.probs.p1)+'% di probabilità (quota implicita '+f1(100/d.probs.p1,2)+'). Punteggio composito superiore.'});
  else if(d.probs.p2>70&&d.b.score>d.a.score+.12)ins.push({ico:'💎',txt:'<strong>Value Bet 2 ('+d.nB+')</strong>: '+f1(d.probs.p2)+'% (quota implicita '+f1(100/d.probs.p2,2)+').'});
  if(d.o25b>75)ins.push({ico:'⚽',txt:'<strong>Over 2.5</strong> molto probabile ('+f1(d.o25b)+'%). Confermato sia dal modello Poisson ('+f1(d.goals.o25)+'%) che dai dati storici.'});
  else if(d.o25b<30)ins.push({ico:'🔒',txt:'<strong>Under 2.5</strong> favorita ('+f1(100-d.o25b)+'%). xG totali bassi ('+f1(d.xA+d.xB,2)+'). Partita tattica.'});
  if(d.bttsb>68)ins.push({ico:'🥅',txt:'<strong>Gol Gol</strong> ('+f1(d.bttsb)+'%): '+d.nA+' ha segnato in '+d.a.bttsH+'/6 gare, '+d.nB+' in '+d.b.bttsH+'/6.'});
  if(d.dc1X>84)ins.push({ico:'🛡️',txt:'<strong>DC 1X</strong> molto sicura: '+f1(d.dc1X)+'%. '+d.nA+' non dovrebbe perdere.'});
  else if(d.dcX2>84)ins.push({ico:'🛡️',txt:'<strong>DC X2</strong> molto sicura: '+f1(d.dcX2)+'%. '+d.nB+' non dovrebbe perdere.'});
  var dm=d.a.mom-d.b.mom;
  if(Math.abs(dm)>55){var sq=dm>0?d.nA:d.nB;ins.push({ico:'📈',txt:'<strong>'+sq+'</strong> in forte crescita di forma: momentum '+f1(Math.abs(dm),0)+'% superiore nelle ultime 6.'});}
  if(d.probs.pX>34&&Math.abs(d.a.score-d.b.score)<.08)ins.push({ico:'⚖️',txt:'<strong>Pareggio plausibile</strong> ('+f1(d.probs.pX)+'%): le due squadre sono statisticamente molto vicine.'});
  if(d.comp==='amich')ins.push({ico:'⚠️',txt:'<strong>Amichevole</strong>: attenzione a rotazioni di formazione e motivazione ridotta. I dati potrebbero non riflettere l\'intensità reale.'});
  if(d.cM<45)ins.push({ico:'⚠️',txt:'<strong>Confidence bassa</strong> ('+d.cM+'%): dati insufficienti o molto variabili. Valuta con maggiore cautela.'});
  return ins.slice(0,6);
}

function saveSt(){
  if(!AN)return;
  var entry={};
  for(var k in AN)entry[k]=AN[k];
  entry.bet='';entry.quota='';entry.risultato='';entry.esito='';
  STOR.unshift(entry);
  save();alert('Salvata!');
}
function reloadSt(idx){
  var s=STOR[idx];if(!s)return;
  AN=s;save();go('analisi');
}

function renderStorico(){
  var ct=document.getElementById('ct-storico');
  var V=0,tot=0;
  for(var i=0;i<STOR.length;i++){if(STOR[i].esito==='V')V++;if(STOR[i].esito==='V'||STOR[i].esito==='P')tot++;}
  var pct=tot>0?f1(V/tot*100,1):0;
  var qArr=[];for(var i=0;i<STOR.length;i++)if(STOR[i].quota&&parseFloat(STOR[i].quota))qArr.push(parseFloat(STOR[i].quota));
  var avgQ=qArr.length?qArr.reduce(function(a,b){return a+b;},0)/qArr.length:0;
  var roi=tot>0?f1((V*avgQ-tot)/tot*100,1):0;
  var h='<div class="stit">Storico</div>';
  if(STOR.length){
    h+='<div class="card"><div class="g3">';
    h+='<div class="st"><div class="sl">Strike Rate</div><div class="sv '+(tot>0&&V/tot>=.5?'pos':'neg')+'">'+(tot>0?pct+'%':'—')+'</div></div>';
    h+='<div class="st"><div class="sl">'+V+'✅ / '+(tot>0?tot-V:0)+'❌</div><div class="sv">'+tot+'/'+STOR.length+'</div></div>';
    h+='<div class="st"><div class="sl">ROI est.</div><div class="sv '+(parseFloat(roi)>=0?'pos':'neg')+'">'+(tot>0?roi+'%':'—')+'</div></div>';
    h+='</div>'+(avgQ>0?'<div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">Quota media: '+avgQ.toFixed(2)+'</div>':'')+' </div>';
    h+='<div class="br" style="margin-bottom:10px">';
    h+='<button class="btn bg bsm" onclick="expSt()">📤 Esporta</button>';
    h+='<button class="btn bg bsm" onclick="document.getElementById(\'impStF\').click()">📥 Importa</button>';
    h+='<button class="btn bd bsm" onclick="clearSt()">🗑 Svuota</button>';
    h+='</div>';
    h+='<input type="file" id="impStF" accept=".json" style="display:none" onchange="impSt(event)">';
    for(var idx=0;idx<STOR.length;idx++){
      var s=STOR[idx];
      var eC=s.esito==='V'?'hV':s.esito==='P'?'hP':'hN';
      var eT=s.esito==='V'?'✓':s.esito==='P'?'✗':'?';
      h+='<div class="hc">';
      h+='<div class="hr" onclick="toggleH('+idx+')">';
      h+='<div class="ht">'+s.nA+' vs '+s.nB+'</div>';
      h+='<span class="hpred">'+s.mO+' '+s.mP+'%</span>';
      if(s.quota)h+='<span style="font-size:11px;color:var(--accent);font-weight:700">@'+s.quota+'</span>';
      if(s.ts)h+='<span style="font-size:10px;color:var(--dim)">'+s.ts+'</span>';
      h+='<div class="heb '+eC+'">'+eT+'</div>';
      h+='</div>';
      h+='<div class="hd" id="hd'+idx+'">';
      h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">';
      h+='<input style="flex:1;min-width:90px;font-size:13px;padding:6px 8px" type="text" placeholder="Scommessa" value="'+(s.bet||'')+'" onchange="STOR['+idx+'].bet=this.value;save()">';
      h+='<input style="width:65px;font-size:13px;padding:6px 8px" type="number" step="0.01" placeholder="Quota" value="'+(s.quota||'')+'" onchange="STOR['+idx+'].quota=this.value;save()">';
      h+='<input style="width:70px;font-size:13px;padding:6px 8px" type="text" placeholder="Ris." value="'+(s.risultato||'')+'" onchange="STOR['+idx+'].risultato=this.value;save()">';
      h+='<select style="width:65px;font-size:13px;padding:6px 8px" onchange="STOR['+idx+'].esito=this.value;save();renderStorico()">';
      h+='<option value="" '+(s.esito?'':'selected')+'>—</option>';
      h+='<option value="V" '+(s.esito==='V'?'selected':'')+'>✅</option>';
      h+='<option value="P" '+(s.esito==='P'?'selected':'')+'>❌</option>';
      h+='</select></div>';
      h+='<div style="font-size:11px;color:var(--dim)">xG '+f1(s.xA,2)+'-'+f1(s.xB,2)+' · Over2.5 '+f1(s.o25b)+'% · BTTS '+f1(s.bttsb)+'%</div>';
      h+='<div style="display:flex;gap:6px;margin-top:6px">';
      h+='<button class="btn bg bxs" onclick="reloadSt('+idx+')">🔄 Ricarica Analisi</button>';
      h+='<button class="btn bd bxs" onclick="delSt('+idx+')">🗑</button>';
      h+='</div></div></div>';
    }
  }else{
    h+='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">💾</div><div style="font-weight:700">Nessuna partita salvata</div></div>';
  }
  h+='<div style="height:16px"></div>';
  ct.innerHTML=h;
}
function toggleH(i){var d=document.getElementById('hd'+i);if(d)d.classList.toggle('open');}
function delSt(i){if(confirm('Eliminare?')){STOR.splice(i,1);save();renderStorico();}}
function clearSt(){if(confirm('Svuotare tutto?')){STOR=[];save();renderStorico();}}
function expSt(){var b=new Blob([JSON.stringify(STOR,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='storico.json';a.click();}
function impSt(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var p=JSON.parse(ev.target.result);if(Array.isArray(p)){STOR=p.concat(STOR);save();renderStorico();alert(p.length+' partite importate.');}else alert('File non valido.');}catch(err){alert('Errore: '+err.message);}};r.readAsText(f);e.target.value='';}

function draw(){if(AT==='input')renderInput();else if(AT==='analisi')renderAnalisi();else if(AT==='storico')renderStorico();}
(function(){if('serviceWorker' in navigator&&!navigator.standalone)window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});})();
load();draw();
</script>
</body>
</html>
