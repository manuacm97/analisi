*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:15px;line-height:1.4;min-height:100vh;padding-bottom:74px;-webkit-font-smoothing:antialiased}

<script>
var SK='asv14';
// Clear any legacy keys that might interfere
try{var _lk=['as_v4','as_v3','asv13'];_lk.forEach(function(k){if(localStorage.getItem(k))localStorage.removeItem(k);});}catch(e){}
var COMPS=[{id:'camp',l:'Campionato',d:'Forma 30% · Posizione 25% · Attacco 20% · Difesa 15% · Momentum 10%'},{id:'coppa',l:'Coppa Nazionale',d:'Forma 40% · Posizione 5% · Attacco 25% · Difesa 15% · Momentum 15%'},{id:'euro',l:'Europa/Internazionale',d:'Forma 35% · Attacco 25% · Difesa 20% · Momentum 20% — classifica non rilevante'},{id:'amich',l:'Amichevole',d:'Alta incertezza — considera rotazioni e motivazione ridotta'}];
var WW={camp:{f:.30,p:.25,a:.20,d:.15,m:.10},coppa:{f:.40,p:.05,a:.25,d:.15,m:.15},euro:{f:.35,p:0,a:.25,d:.20,m:.20},amich:{f:.20,p:0,a:.20,d:.20,m:.10}};
function emptyM(){var r=[];for(var i=0;i<8;i++)r.push({avv:'',gf:0,gs:0,ct:'C',posAvv:0});return r;}
function defS(){return{tA:{name:'',pos:0,tot:20,comp:'camp',matches:emptyM()},tB:{name:'',pos:0,tot:20,comp:'camp',matches:emptyM()},standings:{},tot:20};}
var S=defS(),AN=null,STOR=[];
var AT='input';
function load(){
  try{
    var d=localStorage.getItem(SK);
    if(d){
      var p=JSON.parse(d);
      S=p.s||defS();
      // Backward compat: pad matches to 8
      while(S.tA.matches.length<8)S.tA.matches.push({avv:'',gf:0,gs:0,ct:'C',posAvv:0});
      while(S.tB.matches.length<8)S.tB.matches.push({avv:'',gf:0,gs:0,ct:'C',posAvv:0});
      AN=p.a||null;STOR=p.h||[];
    }
  }catch(e){S=defS();AN=null;STOR=[];}
}
function save(){try{localStorage.setItem(SK,JSON.stringify({s:S,a:AN,h:STOR}));}catch(e){}}
function go(t){var ts=document.querySelectorAll('.tab'),bs=document.querySelectorAll('.nb');for(var i=0;i<ts.length;i++)ts[i].classList.remove('on');for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');document.getElementById('tab-'+t).classList.add('on');document.querySelector('.nb[data-t="'+t+'"]').classList.add('on');AT=t;draw();}

/* PARSER */
function parse7Lines(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var RPP=7;
  if(lines.length<RPP)return{error:'Servono almeno 7 righe (1 partita)'};
  var freq={};
  for(var i=0;i+RPP-1<lines.length;i+=RPP){freq[lines[i+2]]=(freq[lines[i+2]]||0)+1;freq[lines[i+3]]=(freq[lines[i+3]]||0)+1;}
  var nPart=Math.floor(lines.length/RPP),best=null,bestN=0;
  for(var k in freq){if(freq[k]>bestN){bestN=freq[k];best=k;}}
  if(!best)return{error:'Squadra principale non rilevata'};
  var matches=[];
  for(var i=0;i+RPP-1<lines.length&&matches.length<8;i+=RPP){
    var sq1=lines[i+2],sq2=lines[i+3];
    var g1=parseInt(lines[i+4])||0,g2=parseInt(lines[i+5])||0;
    var isH=(sq1===best);
    matches.push({avv:isH?sq2:sq1,gf:isH?g1:g2,gs:isH?g2:g1,ct:isH?'C':'T',posAvv:0});
  }
  return{name:best,matches:matches};
}

function parseStandText(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var result={},pos=1,maxPos=0;

  // Normalize: strip common club prefixes/suffixes for dedup
  function normName(n){
    return n.toLowerCase()
      .replace(/^(ssc|ss|asc?|uc?|fc?|bv|sh?v|hfc?|rc?|gc?)\s+/,'')
      .replace(/^(hellas|us|vf|sv|rb|psv)\s+/,'')
      .replace(/\s+(fc?|sc?|calcio|cf|cfc|afc|bc|bk)$/,'')
      .trim();
  }

  // FORMAT 1: SofaScore markdown links [value](url)
  var linkRe=/^\[([^\]]+)\]\(https?:\/\//;
  var SKIP1=/^(squadra|team|club|pts|pos|rank|form|ultime|diff|gls|pld|mp|gf|ga|gd|played|won|draw|lost|p|w|d|l|g|f|a|n)$/i;
  var allVals=[];
  for(var i=0;i<lines.length;i++){var m=linkRe.exec(lines[i]);if(m)allVals.push(m[1]);}
  if(allVals.length>=3){
    var seen={};
    for(var i=0;i<allVals.length;i++){
      var val=allVals[i];
      if(/^\d+$/.test(val)||/^\d+:\d+$/.test(val)||/^[WDLwdl]$/.test(val)||/^[+\-]\d+$/.test(val)||val.length<3)continue;
      if(!(/[A-Za-z\u00C0-\u024F]/.test(val)))continue;
      if(SKIP1.test(val.trim().split(/\s+/)[0]))continue;
      var key=val.toLowerCase().trim();var nk=normName(key);
      if(!seen[nk]){seen[nk]=1;result[key]=pos++;}
    }
    if(Object.keys(result).length>2)return{standings:result,total:Object.keys(result).length};
    result={};pos=1;
  }

  // FORMAT 2: "2 Inter 35..." or "1. Roma" - numbered rows
  // Extract pairs, renumber sequentially, deduplicate by normalized name
  var pairs=[];
  var SKIP2=/^(w|d|l|gf|ga|gd|pts|pld|mp|p|g|f|a|n|diff|gls|pos|rank)$/i;
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var m=l.match(/^(\d{1,2})[\s.)]+([A-Za-z\u00C0-\u024F][A-Za-z\u00C0-\u024F\s'.&-]{1,26})/);
    if(m){
      var p=parseInt(m[1]);
      var raw=m[2].trim();
      var name=raw.split(/\s{2,}|\t|\s\d/)[0].trim();
      if(name.length>1&&p>=1&&p<=50&&!SKIP2.test(name))pairs.push({p:p,n:name.toLowerCase()});
    }
  }
  if(pairs.length>2){
    pairs.sort(function(a,b){return a.p-b.p;});
    var seen2={};
    for(var i=0;i<pairs.length;i++){
      var nk=normName(pairs[i].n);
      if(!seen2[nk]){seen2[nk]=1;result[pairs[i].n]=pos++;}
    }
    if(Object.keys(result).length>2)return{standings:result,total:Object.keys(result).length};
    result={};pos=1;
  }

  // FORMAT 3: sequential names — lines starting with capital letter
  var SKIP3=/^(squadra|team|club|pts|pld|mp|gf|ga|gd|diff|gls|ultime|rank|pos|form|serie|classifica|campionato|coppa|lega|stagione|totale|giornata|data|competizione|gruppo|gironi)$/i;
  var seen3={};
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(/^\d+$/.test(l)||l.length<3)continue;
    // Skip pure stat lines
    if(/^[+\-]\d+$/.test(l)||/^\d+:\d+$/.test(l))continue;
    var m=l.match(/^([A-Z][A-Za-z\u00C0-\u024F\s'.&-]{2,28})(?:\s+\d.*)?$/);
    if(m){
      var name=m[1].trim().split(/\s{2,}/)[0].trim();
      var fw=name.split(/\s+/)[0];
      if(SKIP3.test(fw)||SKIP3.test(name))continue;
      if(name.length<3||name.length>30)continue;
      var nk=normName(name.toLowerCase());
      if(!seen3[nk]){seen3[nk]=1;result[name.toLowerCase()]=pos++;}
    }
  }
  if(Object.keys(result).length>2)return{standings:result,total:pos-1};

  return{standings:{},total:0};
}

function findPos(name,standings){
  if(!name||!standings)return 0;
  var low=name.toLowerCase().trim();
  if(standings[low])return standings[low];
  var keys=Object.keys(standings);
  for(var i=0;i<keys.length;i++){var k=keys[i];if(low.length>=4&&k.indexOf(low.slice(0,4))>=0)return standings[k];if(k.length>=4&&low.indexOf(k.slice(0,4))>=0)return standings[k];}
  return 0;
}

function applyStand(standings,total){
  S.standings=standings;S.tot=total;
  if(S.tA.name){S.tA.pos=findPos(S.tA.name,standings)||0;S.tA.tot=total;}
  if(S.tB.name){S.tB.pos=findPos(S.tB.name,standings)||0;S.tB.tot=total;}
  [S.tA,S.tB].forEach(function(team){team.matches.forEach(function(m){if(m.avv)m.posAvv=findPos(m.avv,standings)||0;});});
  save();
}

/* MATH */
function poisson(L,k){if(L<=0)return k===0?1:0;var r=Math.exp(-L);for(var i=1;i<=k;i++)r*=L/i;return r;}
function wAvg(v){var w=[1,.9,.82,.74,.66,.58,.50,.42],sv=0,sw=0;for(var i=0;i<v.length&&i<w.length;i++){sv+=v[i]*w[i];sw+=w[i];}return sw?sv/sw:0;}
function calcMom(gf,gs){var r=0,o=0;for(var i=0;i<3;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;r+=p;}for(var i=3;i<6;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;o+=p;}return o===0?(r?100:0):(r-o)/o*100;}
function calc1X2(xA,xB){var p1=0,pX=0,p2=0;for(var i=0;i<=7;i++)for(var j=0;j<=7;j++){var p=poisson(xA,i)*poisson(xB,j);if(i>j)p1+=p;else if(i===j)pX+=p;else p2+=p;}var t=p1+pX+p2;return t?{p1:p1/t*100,pX:pX/t*100,p2:p2/t*100}:{p1:33,pX:33,p2:34};}
function calcGoals(xA,xB){var t=xA+xB;return{o05:(1-poisson(t,0))*100,o15:(1-poisson(t,0)-poisson(t,1))*100,o25:(1-poisson(t,0)-poisson(t,1)-poisson(t,2))*100,o35:(1-poisson(t,0)-poisson(t,1)-poisson(t,2)-poisson(t,3))*100,btts:(1-poisson(xA,0))*(1-poisson(xB,0))*100};}
function calcRange(xA,xB,lo,hi){var p=0;for(var i=0;i<=9;i++)for(var j=0;j<=9;j++)if(i+j>=lo&&i+j<=hi)p+=poisson(xA,i)*poisson(xB,j);return p*100;}
function calcCS(xA,xB){var sc=[];for(var i=0;i<=5;i++)for(var j=0;j<=5;j++)sc.push({s:i+'-'+j,p:poisson(xA,i)*poisson(xB,j)*100,w:i>j?'A':i<j?'B':'X'});sc.sort(function(a,b){return b.p-a.p;});return sc.slice(0,8);}
function calcSoS(posAvv,tot){var v=posAvv.filter(function(p){return p>0&&p<=tot;});if(!v.length)return{sos:.5,comp:0};return{sos:v.reduce(function(a,b){return a+b;},0)/v.length/tot,comp:v.length/8};}

function analyzeTeam(t){
  var m=t.matches,gf=[],gs=[],ct=[],posAvv=[];
  for(var i=0;i<m.length;i++){gf.push(m[i].gf);gs.push(m[i].gs);ct.push(m[i].ct);posAvv.push(m[i].posAvv);}
  var V=0,P=0;for(var i=0;i<gf.length;i++){if(gf[i]>gs[i])V++;else if(gf[i]===gs[i])P++;}
  var L=gf.length-V-P,pts=V*3+P;
  var iC=[],iT=[];for(var i=0;i<ct.length;i++){ct[i]==='C'?iC.push(i):iT.push(i);}
  var avg=function(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:0;};
  var gfC=iC.map(function(i){return gf[i];}),gsC=iC.map(function(i){return gs[i];});
  var gfT=iT.map(function(i){return gf[i];}),gsT=iT.map(function(i){return gs[i];});
  var mgfP=wAvg(gf),mgsP=wAvg(gs),mom=calcMom(gf,gs);
  var sos=calcSoS(posAvv,t.tot||20);
  var cleanS=0,bttsH=0,o25H=0;
  for(var i=0;i<gf.length;i++){if(gs[i]===0)cleanS++;if(gf[i]>0&&gs[i]>0)bttsH++;if(gf[i]+gs[i]>2)o25H++;}
  var posN=t.pos>0&&t.tot>1?1-(t.pos-1)/(t.tot-1):.5;
  var w=WW[t.comp]||WW.camp;
  var score=(pts/18)*w.f+posN*w.p+(mgfP/3)*w.a+(1-mgsP/3)*w.d+((mom+100)/200)*w.m;
  if(sos.comp>.5)score+=(1-sos.sos)*.05;
  score=Math.max(0,Math.min(1,score));
  if(t.comp==='amich')score=score*.7+.15;
  var varG=0,mG=avg(gf);for(var i=0;i<gf.length;i++)varG+=(gf[i]-mG)*(gf[i]-mG);varG/=Math.max(gf.length,1);
  var cf=50;if(varG<1)cf+=15;else if(varG>3)cf-=15;cf+=sos.comp*20;cf+=Math.abs(mom)>50?15:Math.abs(mom)>20?8:0;cf+=Math.min(iC.length,iT.length)*2;cf=Math.max(0,Math.min(100,Math.round(cf)));
  var esiti=[];for(var i=0;i<gf.length;i++)esiti.push(gf[i]>gs[i]?'V':gf[i]===gs[i]?'P':'S');
  return{V:V,P:P,L:L,pts:pts,gf:gf,gs:gs,ct:ct,posAvv:posAvv,mgfP:mgfP,mgsP:mgsP,agf:avg(gf),ags:avg(gs),agfC:avg(gfC),agsC:avg(gsC),agfT:avg(gfT),agsT:avg(gsT),mom:mom,sos:sos,score:score,conf:cf,cleanS:cleanS,bttsH:bttsH,o25H:o25H,esiti:esiti,matches:m,pos:t.pos,tot:t.tot};
}

function runAnalysis(){
  var a=analyzeTeam(S.tA),b=analyzeTeam(S.tB);
  var nA=S.tA.name||'Casa',nB=S.tB.name||'Trasferta';
  var xA=Math.max(.15,(a.agfC||a.mgfP)*.6+(b.agsT||b.mgsP)*.4);
  var xB=Math.max(.15,(b.agfT||b.mgfP)*.6+(a.agsC||a.mgsP)*.4);
  var probs=calc1X2(xA,xB),goals=calcGoals(xA,xB);
  var o25b=goals.o25*.65+(a.o25H+b.o25H)/16*100*.35;
  var bttsb=goals.btts*.65+(a.bttsH+b.bttsH)/16*100*.35;
  var dc1X=probs.p1+probs.pX,dcX2=probs.p2+probs.pX;
  var cM=Math.round((a.conf+b.conf)/2),cL=cM>=70?'H':cM>=45?'M':'L';
  var mO=probs.p1>=probs.pX&&probs.p1>=probs.p2?'1':probs.pX>=probs.p2?'X':'2';
  var mP=mO==='1'?probs.p1:mO==='X'?probs.pX:probs.p2;
  var cs=calcCS(xA,xB);
  var mgRanges=[[1,2],[1,3],[1,4],[1,5],[1,6],[2,3],[2,4],[2,5],[2,6],[3,4],[3,5],[3,6],[4,5],[4,6],[5,6]];
  var mg=[];for(var i=0;i<mgRanges.length;i++)mg.push({r:mgRanges[i][0]+'-'+mgRanges[i][1],p:calcRange(xA,xB,mgRanges[i][0],mgRanges[i][1])});
  var tgA05=(1-poisson(xA,0))*100,tgA15=(1-poisson(xA,0)-poisson(xA,1))*100;
  var tgB05=(1-poisson(xB,0))*100,tgB15=(1-poisson(xB,0)-poisson(xB,1))*100;
  var now=new Date();
  var ts=now.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  AN={nA:nA,nB:nB,a:a,b:b,xA:xA,xB:xB,probs:probs,goals:goals,o25b:o25b,bttsb:bttsb,dc1X:dc1X,dcX2:dcX2,cM:cM,cL:cL,mO:mO,mP:mP.toFixed(0),mQ:(100/mP).toFixed(2),cs:cs,mg:mg,tgA05:tgA05,tgA15:tgA15,tgB05:tgB05,tgB15:tgB15,comp:S.tA.comp,ts:ts};
  save();go('analisi');
}

      var ctC=m.ct==='C'?'var(--pos)':'var(--blue)';
      var pH=m.posAvv?'<span style="font-size:9px;color:var(--dim)"> #'+m.posAvv+'</span>':'';
      h+='<tr><td><span class="fd '+ec+'">'+e+'</span></td><td style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+m.avv+pH+'</td><td style="font-weight:700">'+m.gf+'-'+m.gs+'</td><td style="font-size:10px;font-weight:700;color:'+ctC+'">'+m.ct+'</td></tr>';
    }
    h+='</tbody></table>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:6px"><strong>'+tm.V+'V '+tm.P+'P '+tm.L+'S</strong> &middot; '+tm.pts+'/24pt<br>';
    h+='Gol: '+f1(tm.agf,2)+' fatti / '+f1(tm.ags,2)+' subiti<br>';
    h+='CS: '+tm.cleanS+'/8 &middot; BTTS: '+tm.bttsH+'/8 &middot; Over2.5: '+tm.o25H+'/8<br>';
    h+='Momentum: '+(tm.mom>20?'📈':tm.mom<-20?'📉':'➡️')+' '+(tm.mom>0?'+':'')+tm.mom.toFixed(0)+'%';
    if(tm.pos>0)h+='<br>Classifica: <strong style="color:var(--text)">'+tm.pos+'° su '+tm.tot+'</strong>';
    h+='</div></div>';
  }
  h+='</div></div>';

  h+='<div class="card"><div class="cl">Punteggio Composito</div><div class="g2">';
  h+='<div class="st"><div class="sl">'+d.nA+'</div><div class="sv" style="color:'+pc(d.a.score*100)+'">'+f1(d.a.score*100,1)+'</div><div class="ss">/100</div></div>';
  h+='<div class="st"><div class="sl">'+d.nB+'</div><div class="sv" style="color:'+pc(d.b.score*100)+'">'+f1(d.b.score*100,1)+'</div><div class="ss">/100</div></div>';
  h+='</div></div>';

  h+='<div class="card"><div class="cl">Risultato Esatto — Top 8</div><div class="g4">';
  for(var i=0;i<d.cs.length;i++){var cs=d.cs[i],cc=cs.w==='A'?'var(--pos)':cs.w==='B'?'var(--blue)':'var(--muted)';h+='<div style="background:var(--s2);border-radius:7px;padding:7px 5px;text-align:center;border:1px solid var(--border)"><div style="font-size:13px;font-weight:700;color:'+cc+'">'+cs.s+'</div><div style="font-size:10px;color:var(--muted)">'+f1(cs.p)+'%</div></div>';}
  h+='</div></div>';

  var ins=buildInsights(d);
  if(ins.length){h+='<div class="card"><div class="cl">Spunti</div>';for(var i=0;i<ins.length;i++)h+='<div class="ins"><span class="ii">'+ins[i].ico+'</span><div class="it">'+ins[i].txt+'</div></div>';h+='</div>';}

  h+='<div class="card"><div class="cl">🤖 Prompt AI</div>';
  h+='<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Genera un prompt per ChatGPT/Gemini/Perplexity — formazioni, assenti, dichiarazioni, sentiment.</div>';
  h+='<button class="btn ba bfu" onclick="showPrompt()">📋 Genera Prompt</button>';
  h+='<div id="promptDiv" style="display:none;margin-top:10px"><div class="parea" id="promptText"></div>';
  h+='<div class="br"><button class="btn bg2 bsm" onclick="copyPrompt()">📋 Copia</button><a class="btn bg2 bsm" href="https://chatgpt.com" target="_blank">ChatGPT</a><a class="btn bg2 bsm" href="https://gemini.google.com" target="_blank">Gemini</a></div></div></div>';

  h+='<div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn ba" style="flex:1" onclick="saveSt()">💾 Salva in Storico</button><button class="btn bg2 bsm" onclick="go(\'input\')">✏️ Modifica</button></div>';
  h+='<div class="al ai2" style="font-size:11px;margin-bottom:16px">⚠️ Analisi statistica. Non è garanzia di vincita. Gioca responsabilmente.</div>';
  ct.innerHTML=h;
}

function buildInsights(d){
  var ins=[];
  if(d.probs.p1>70&&d.a.score>d.b.score+.12)ins.push({ico:'💎',txt:'<strong>Value Bet 1 ('+d.nA+')</strong>: '+f1(d.probs.p1)+'% — quota implicita '+f1(100/d.probs.p1,2)+'.'});
  else if(d.probs.p2>70&&d.b.score>d.a.score+.12)ins.push({ico:'💎',txt:'<strong>Value Bet 2 ('+d.nB+')</strong>: '+f1(d.probs.p2)+'% — quota implicita '+f1(100/d.probs.p2,2)+'.'});
  if(d.o25b>75)ins.push({ico:'⚽',txt:'<strong>Over 2.5</strong> molto probabile ('+f1(d.o25b)+'%). xG totale '+f1(d.xA+d.xB,2)+'.'});
  else if(d.o25b<30)ins.push({ico:'🔒',txt:'<strong>Under 2.5</strong> favorita ('+f1(100-d.o25b)+'%). Partita tattica.'});
  if(d.bttsb>68)ins.push({ico:'🥅',txt:'<strong>Gol Gol</strong>: '+f1(d.bttsb)+'%. '+d.nA+' segna '+d.a.bttsH+'/8, '+d.nB+' segna '+d.b.bttsH+'/8.'});
  if(d.dc1X>84)ins.push({ico:'🛡️',txt:'<strong>DC 1X</strong>: '+f1(d.dc1X)+'%. '+d.nA+' difficilmente perde.'});
  else if(d.dcX2>84)ins.push({ico:'🛡️',txt:'<strong>DC X2</strong>: '+f1(d.dcX2)+'%. '+d.nB+' difficilmente perde.'});
  var dm=d.a.mom-d.b.mom;
  if(Math.abs(dm)>55){var sq=dm>0?d.nA:d.nB;ins.push({ico:'📈',txt:'<strong>'+sq+'</strong> in grande crescita di forma nelle ultime 8.'});}
  if(d.probs.pX>34&&Math.abs(d.a.score-d.b.score)<.08)ins.push({ico:'⚖️',txt:'<strong>Pareggio plausibile</strong> ('+f1(d.probs.pX)+'%): squadre molto equilibrate.'});
  if(d.comp==='amich')ins.push({ico:'⚠️',txt:'<strong>Amichevole</strong>: alta incertezza — considera rotazioni e motivazione.'});
  if(d.cM<45)ins.push({ico:'⚠️',txt:'<strong>Confidence bassa</strong> ('+d.cM+'%): dati scarsi o inconsistenti.'});
  return ins.slice(0,6);
}

function showPrompt(){
  var d=AN;if(!d)return;
  var cn=(COMPS.find(function(c){return c.id===d.comp;})||COMPS[0]).l;
  var p='Analizza nel modo più COMPLETO e DETTAGLIATO questa partita:\n\n'+d.nA+' vs '+d.nB+' — '+cn+'\n\n';
  p+='ANALISI RICHIESTA:\n\n';
  p+='1. INDISPONIBILI — infortuni certi, squalifiche, giocatori a rischio. Impatto sulla rosa.\n\n';
  p+='2. STATO DI FORMA E MORALE — clima spogliatoio, stanchezza da calendario, motivazione specifica per questa partita, rendimento recente dei singoli chiave\n\n';
  p+='3. DICHIARAZIONI PRE-PARTITA — cosa hanno detto allenatori e giocatori chiave in conferenza stampa o interviste recenti\n\n';
  p+='4. SENTIMENT MEDIA E TIFOSI — come viene percepita la partita, pronostici dei media sportivi, umore delle tifoserie\n\n';
  p+='5. TUA PREVISIONE MOTIVATA — quale esito ritieni più probabile e perché, dove potrebbe sbagliare l\'analisi algoritmica, mercati con maggiore valore, livello di incertezza\n';
  document.getElementById('promptText').textContent=p;
  document.getElementById('promptDiv').style.display='block';
}
function copyPrompt(){var t=document.getElementById('promptText');if(t&&t.textContent)navigator.clipboard.writeText(t.textContent).then(function(){alert('Copiato!');}).catch(function(){});}

/* STORICO */
function saveSt(){
  if(!AN)return;
  var e={};for(var k in AN)e[k]=AN[k];
  e.bet='';e.quota='';e.risultato='';e.esito='';
  STOR.unshift(e);save();alert('Salvata!');
}
function reloadSt(idx){var s=STOR[idx];if(!s)return;AN=s;save();go('analisi');}

function renderStorico(){
  var ct=document.getElementById('ct-storico');
  var V=0,tot=0;
  for(var i=0;i<STOR.length;i++){if(STOR[i].esito==='V')V++;if(STOR[i].esito==='V'||STOR[i].esito==='P')tot++;}
  var pct=tot>0?f1(V/tot*100,1):0;
  var qArr=[];for(var i=0;i<STOR.length;i++)if(STOR[i].quota&&parseFloat(STOR[i].quota))qArr.push(parseFloat(STOR[i].quota));
  var avgQ=qArr.length?qArr.reduce(function(a,b){return a+b;},0)/qArr.length:0;
  var roi=tot>0?f1((V*avgQ-tot)/tot*100,1):0;
  var h='<div class="stit">Storico</div>';
  if(STOR.length){
    h+='<div class="card"><div class="g3"><div class="st"><div class="sl">Strike Rate</div><div class="sv '+(tot>0&&V/tot>=.5?'pos':'neg')+'">'+(tot>0?pct+'%':'—')+'</div></div>';
    h+='<div class="st"><div class="sl">'+V+'✅/'+( tot>0?tot-V:0)+'❌</div><div class="sv">'+tot+'/'+STOR.length+'</div></div>';
    h+='<div class="st"><div class="sl">ROI est.</div><div class="sv '+(parseFloat(roi)>=0?'pos':'neg')+'">'+(tot>0?roi+'%':'—')+'</div></div></div>';
    if(avgQ>0)h+='<div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">Quota media: '+avgQ.toFixed(2)+'</div>';
    h+='</div>';
    h+='<div class="br" style="margin-bottom:10px"><button class="btn bg2 bsm" onclick="expSt()">📤 Esporta</button><button class="btn bg2 bsm" onclick="document.getElementById(\'impStF\').click()">📥 Importa</button><button class="btn bd bsm" onclick="clearSt()">🗑</button></div>';
    h+='<input type="file" id="impStF" accept=".json" style="display:none" onchange="impSt(event)">';
    for(var idx=0;idx<STOR.length;idx++){
      var s=STOR[idx];
      var eC=s.esito==='V'?'hV':s.esito==='P'?'hP':'hN';
      var eT=s.esito==='V'?'✓':s.esito==='P'?'✗':'?';
      h+='<div class="hc"><div class="hr2" onclick="toggleH('+idx+')"><div class="ht">'+s.nA+' vs '+s.nB+'</div>';
      h+='<span class="hpred">'+s.mO+' '+s.mP+'%</span>';
      if(s.quota)h+='<span style="font-size:11px;color:var(--accent);font-weight:700">@'+s.quota+'</span>';
      if(s.ts)h+='<span style="font-size:10px;color:var(--dim)">'+s.ts+'</span>';
      h+='<div class="heb '+eC+'">'+eT+'</div></div>';
      h+='<div class="hd" id="hd'+idx+'"><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">';
      h+='<input style="flex:1;min-width:90px;font-size:13px;padding:6px 8px" type="text" placeholder="Scommessa" value="'+(s.bet||'')+'" onchange="STOR['+idx+'].bet=this.value;save()">';
      h+='<input style="width:65px;font-size:13px;padding:6px 8px" type="number" step="0.01" placeholder="Quota" value="'+(s.quota||'')+'" onchange="STOR['+idx+'].quota=this.value;save()">';
      h+='<input style="width:70px;font-size:13px;padding:6px 8px" type="text" placeholder="Ris." value="'+(s.risultato||'')+'" onchange="STOR['+idx+'].risultato=this.value;save()">';
      h+='<select style="width:65px;font-size:13px;padding:6px 8px" onchange="STOR['+idx+'].esito=this.value;save();renderStorico()">';
      h+='<option value="" '+(s.esito?'':'selected')+'>—</option><option value="V" '+(s.esito==='V'?'selected':'')+'>✅</option><option value="P" '+(s.esito==='P'?'selected':'')+'>❌</option></select></div>';
      h+='<div style="font-size:11px;color:var(--dim)">xG '+f1(s.xA,2)+'-'+f1(s.xB,2)+' · Over2.5 '+f1(s.o25b)+'% · BTTS '+f1(s.bttsb)+'%</div>';
      h+='<div style="display:flex;gap:6px;margin-top:6px"><button class="btn bg2 bxs" onclick="reloadSt('+idx+')">🔄 Ricarica</button><button class="btn bd bxs" onclick="delSt('+idx+')">🗑</button></div></div></div>';
    }
  }else{
    h+='<div class="br" style="margin-bottom:14px"><button class="btn bg2 bsm" onclick="document.getElementById(\'impStF2\').click()">📥 Importa Storico</button></div>';
    h+='<input type="file" id="impStF2" accept=".json" style="display:none" onchange="impSt(event)">';
    h+='<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">💾</div><div style="font-weight:700">Nessuna partita salvata</div></div>';
  }
  h+='<div style="height:16px"></div>';
  ct.innerHTML=h;
}
function toggleH(i){var d=document.getElementById('hd'+i);if(d)d.classList.toggle('open');}
function delSt(i){if(confirm('Eliminare?')){STOR.splice(i,1);save();renderStorico();}}
function clearSt(){if(confirm('Svuotare tutto?')){STOR=[];save();renderStorico();}}
function expSt(){var b=new Blob([JSON.stringify(STOR,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='storico.json';a.click();}
function impSt(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var p=JSON.parse(ev.target.result);if(Array.isArray(p)){STOR=p.concat(STOR);save();renderStorico();alert(p.length+' partite importate.');}else alert('File non valido.');}catch(err){alert('Errore: '+err.message);}};r.readAsText(f);e.target.value='';}

function draw(){
  try{
    if(AT==='input')renderInput();
    else if(AT==='analisi')renderAnalisi();
    else if(AT==='storico')renderStorico();
  }catch(e){
    var el=document.getElementById('ct-'+AT)||document.body;
    el.innerHTML='<div style="padding:16px;color:#e05c5c;font-family:monospace;font-size:11px;white-space:pre-wrap;background:#1a0808;border-radius:8px;margin:14px">Errore: '+e.message+'</div>';
  }
}
(function(){if('serviceWorker' in navigator&&!navigator.standalone)window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});})();
load();draw();
</script>
