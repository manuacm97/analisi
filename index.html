<style>
:root{--bg:#0c0c12;--s1:#161620;--s2:#1e1e2a;--s3:#272733;--text:#eceaf5;--muted:#7c7a90;--dim:#3c3a50;--accent:#f5a623;--ad:rgba(245,166,35,.13);--pos:#3ecf8e;--pd:rgba(62,207,142,.13);--neg:#e05c5c;--nd:rgba(224,92,92,.13);--blue:#4a9eff;--bd:rgba(74,158,255,.13);--border:rgba(255,255,255,.08);--r:14px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:15px;line-height:1.4;min-height:100vh;padding-bottom:74px;-webkit-font-smoothing:antialiased}
.hdr{position:sticky;top:0;z-index:100;background:rgba(12,12,18,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center}
.logo{font-size:17px;font-weight:900;color:var(--accent);flex:1}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(22,22,32,.98);border-top:1px solid var(--border);display:flex;height:64px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--dim);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;background:none;padding:0;transition:color .2s}
.nb.on{color:var(--accent)}.ni{font-size:20px;line-height:1}

.ct{padding:14px 14px 4px;max-width:580px;margin:0 auto}
.card{background:var(--s1);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.pos{color:var(--pos)}.neg{color:var(--neg)}.acc{color:var(--accent)}.blu{color:var(--blue)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px}
.st{background:var(--s2);border-radius:var(--rs);padding:10px 12px}
.sl{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:2px}.sv{font-size:17px;font-weight:700}

input,select,textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:9px 11px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none}

.ig{margin-bottom:9px}.ir{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 15px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,transform .1s;white-space:nowrap;font-family:inherit}

.ba{background:var(--accent);color:#0c0c12}.bg2{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.bd{background:var(--nd);color:var(--neg);border:1px solid rgba(224,92,92,.3)}
.bsm{padding:6px 11px;font-size:13px}.bxs{padding:4px 8px;font-size:12px;font-weight:700}
.bfu{width:100%;display:flex}.br{display:flex;gap:6px;flex-wrap:wrap}
.al{padding:10px 12px;border-radius:var(--rs);font-size:12px;margin-bottom:8px;line-height:1.5;font-weight:500}
.aw{background:var(--ad);border:1px solid rgba(245,166,35,.3);color:var(--accent)}
.ap{background:var(--pd);border:1px solid rgba(62,207,142,.35);color:var(--pos)}
.ai2{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted)}
.an{background:var(--nd);border:1px solid rgba(224,92,92,.35);color:var(--neg)}
.sep{height:1px;background:var(--border);margin:11px 0}

.fd{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:800}
.fv{background:var(--pd);color:var(--pos)}.fp{background:rgba(255,255,255,.06);color:var(--muted)}.fs{background:var(--nd);color:var(--neg)}
.pbl{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;font-weight:700}
.pbt{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;display:flex;gap:2px}
.pbs{height:100%;border-radius:3px;transition:width .5s}

.gg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.gc{background:var(--s2);border-radius:var(--rs);padding:9px 11px;border:1px solid var(--border)}
.gcl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.gcv{font-size:20px;font-weight:800;letter-spacing:-.5px}
.gcb{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
.gcf{height:100%;border-radius:2px;transition:width .5s}
.gce{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.3}
.xgr{display:flex;align-items:center;gap:8px;margin-bottom:6px}

.xgn{font-size:12px;font-weight:700;min-width:32px;text-align:right}
.ins{display:flex;gap:9px;padding:9px 11px;background:var(--s2);border-radius:var(--rs);margin-bottom:5px;border:1px solid var(--border)}
.ii{font-size:16px;flex-shrink:0;margin-top:1px}.it{font-size:12px;line-height:1.5}
.pred{text-align:center;padding:4px 0 12px}
.prv{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--accent)}
.prp{font-size:16px;font-weight:700;margin-top:4px}
.prl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.cb{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-top:7px}
.cH{background:var(--pd);color:var(--pos)}.cM{background:var(--ad);color:var(--accent)}.cL{background:var(--nd);color:var(--neg)}
.mgc{background:var(--s2);border-radius:var(--rs);padding:8px 10px;border:1px solid var(--border);text-align:center}
.mgl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:2px}.mgv{font-size:16px;font-weight:800}
.hc{background:var(--s2);border-radius:var(--rs);margin-bottom:4px;border:1px solid var(--border);overflow:hidden}
.hr2{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer}
.ht{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hpred{font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px;background:var(--s3);color:var(--muted);flex-shrink:0}
.heb{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.hV{background:var(--pd);color:var(--pos)}.hP{background:var(--nd);color:var(--neg)}.hN{background:var(--s3);color:var(--dim)}
.hd{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.hd.open{max-height:220px;padding:0 12px 10px}
.parea{background:var(--s3);border-radius:var(--rs);padding:12px;font-size:11px;line-height:1.6;color:var(--muted);max-height:200px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--border);margin-bottom:8px}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
</style>

<body>

<div id="tab-input" class="tab on"><div class="ct" id="ct-input"></div></div>
<div id="tab-analisi" class="tab"><div class="ct" id="ct-analisi"></div></div>
<div id="tab-storico" class="tab"><div class="ct" id="ct-storico"></div></div>
<nav class="nav">
  <button class="nb on" data-t="input" onclick="go('input')"><span class="ni">📋</span>Input</button>
  <button class="nb" data-t="analisi" onclick="go('analisi')"><span class="ni">📊</span>Analisi</button>
  <button class="nb" data-t="storico" onclick="go('storico')"><span class="ni">💾</span>Storico</button>

<script>
var SK='asv14';
// Clear any legacy keys that might interfere
try{var _lk=['as_v4','as_v3','asv13'];_lk.forEach(function(k){if(localStorage.getItem(k))localStorage.removeItem(k);});}catch(e){}
var COMPS=[{id:'camp',l:'Campionato',d:'Forma 30% · Posizione 25% · Attacco 20% · Difesa 15% · Momentum 10%'},{id:'coppa',l:'Coppa Nazionale',d:'Forma 40% · Posizione 5% · Attacco 25% · Difesa 15% · Momentum 15%'},{id:'euro',l:'Europa/Internazionale',d:'Forma 35% · Attacco 25% · Difesa 20% · Momentum 20% — classifica non rilevante'},{id:'amich',l:'Amichevole',d:'Alta incertezza — considera rotazioni e motivazione ridotta'}];
var WW={camp:{f:.30,p:.25,a:.20,d:.15,m:.10},coppa:{f:.40,p:.05,a:.25,d:.15,m:.15},euro:{f:.35,p:0,a:.25,d:.20,m:.20},amich:{f:.20,p:0,a:.20,d:.20,m:.10}};
function emptyM(){var r=[];for(var i=0;i<8;i++)r.push({avv:'',gf:0,gs:0,ct:'C',posAvv:0});return r;}
function defS(){return{tA:{name:'',pos:0,tot:20,comp:'camp',matches:emptyM()},tB:{name:'',pos:0,tot:20,comp:'camp',matches:emptyM()},standings:{},tot:20};}
var S=defS(),AN=null,STOR=[];
var AT='input';
function load(){
  try{
    var d=localStorage.getItem(SK);
    if(d){
      var p=JSON.parse(d);
      S=p.s||defS();
      // Backward compat: pad matches to 8
      while(S.tA.matches.length<8)S.tA.matches.push({avv:'',gf:0,gs:0,ct:'C',posAvv:0});
      while(S.tB.matches.length<8)S.tB.matches.push({avv:'',gf:0,gs:0,ct:'C',posAvv:0});
      AN=p.a||null;STOR=p.h||[];
    }
  }catch(e){S=defS();AN=null;STOR=[];}
}
function save(){try{localStorage.setItem(SK,JSON.stringify({s:S,a:AN,h:STOR}));}catch(e){}}
function go(t){var ts=document.querySelectorAll('.tab'),bs=document.querySelectorAll('.nb');for(var i=0;i<ts.length;i++)ts[i].classList.remove('on');for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');document.getElementById('tab-'+t).classList.add('on');document.querySelector('.nb[data-t="'+t+'"]').classList.add('on');AT=t;draw();}

/* PARSER */
function parse7Lines(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var RPP=7;
  if(lines.length<RPP)return{error:'Servono almeno 7 righe (1 partita)'};
  var freq={};
  for(var i=0;i+RPP-1<lines.length;i+=RPP){freq[lines[i+2]]=(freq[lines[i+2]]||0)+1;freq[lines[i+3]]=(freq[lines[i+3]]||0)+1;}
  var nPart=Math.floor(lines.length/RPP),best=null,bestN=0;
  for(var k in freq){if(freq[k]>bestN){bestN=freq[k];best=k;}}
  if(!best)return{error:'Squadra principale non rilevata'};
  var matches=[];
  for(var i=0;i+RPP-1<lines.length&&matches.length<8;i+=RPP){
    var sq1=lines[i+2],sq2=lines[i+3];
    var g1=parseInt(lines[i+4])||0,g2=parseInt(lines[i+5])||0;
    var isH=(sq1===best);
    matches.push({avv:isH?sq2:sq1,gf:isH?g1:g2,gs:isH?g2:g1,ct:isH?'C':'T',posAvv:0});
  }
  return{name:best,matches:matches};
}

function parseStandText(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var result={},pos=1,maxPos=0;

  // Normalize: strip common club prefixes/suffixes for dedup
  function normName(n){
    var s=n.toLowerCase()
      // Strip common club prefixes
      .replace(/^(ssc|ss|asc?|uc?|fc?|bv|bvb|shv|hfc?|rc?|gc?|cfr|fk|nk|sk|ik|svb?|tsv|tsg|rb|wfc|bsc|hsv|vfl|vfb|rcd|rsa|rsca|sd|ud|ca|ra|cf|rce|sport(?:ing)?|real|deportivo)\s+/i,'')
      // Strip number prefixes like "1. FC"
      .replace(/^\d+\.?\s*(fc|sc|bc)?\s+/i,'')
      // Strip prefixes: hellas, us, psv etc
      .replace(/^(hellas|us|vf|rb|psv|borussia|dynamo|lokomotiv|spartak|cska)\s+/i,'')
      // Strip location particles at end: "de Vigo" "del Mar" etc
      .replace(/\s+(de|del|di|vom?|am|das|dos|els|las|les|los|van\s+de[rn]?)\s+\S+$/i,'')
      // Strip trailing club suffixes
      .replace(/\s+(fc|sc|cf|ac|bc|bk|afc|rfc|calcio|city|united|town|rovers|wanderers|athletic)$/i,'')
      .replace(/\s+/g,' ').trim();
    return s;
  }
  function isSameTeam(a,b){
    var na=normName(a),nb=normName(b);
    if(na===nb)return true;
    if(na.length<4||nb.length<4)return false;
    // STARTS-WITH check only (not contains) to avoid Real Madrid ≡ Atletico Madrid
    if(nb.indexOf(na)===0&&(nb.length===na.length||nb[na.length]===' '))return true;
    if(na.indexOf(nb)===0&&(na.length===nb.length||na[nb.length]===' '))return true;
    return false;
  }

  // FORMAT 1: SofaScore markdown links [value](url)
  var linkRe=/^\[([^\]]+)\]\(https?:\/\//;
  var SKIP1=/^(squadra|team|club|pts|pos|rank|form|ultime|diff|gls|pld|mp|gf|ga|gd|played|won|draw|lost|p|w|d|l|g|f|a|n)$/i;
  var allVals=[];
  for(var i=0;i<lines.length;i++){var m=linkRe.exec(lines[i]);if(m)allVals.push(m[1]);}
  if(allVals.length>=3){
    var seen={};
    for(var i=0;i<allVals.length;i++){
      var val=allVals[i];
      if(/^\d+$/.test(val)||/^\d+:\d+$/.test(val)||/^[WDLwdl]$/.test(val)||/^[+\-]\d+$/.test(val)||val.length<3)continue;
      if(!(/[A-Za-z\u00C0-\u024F]/.test(val)))continue;
      if(SKIP1.test(val.trim().split(/\s+/)[0]))continue;
      var key=val.toLowerCase().trim();
      // Check if already have a team that's effectively the same
      var isDup=false;
      var existingKeys=Object.keys(result);
      for(var ei=0;ei<existingKeys.length;ei++){if(isSameTeam(key,existingKeys[ei])){isDup=true;break;}}
      if(!isDup){result[key]=pos++;}
    }
    if(Object.keys(result).length>2)return{standings:result,total:Object.keys(result).length};
    result={};pos=1;
  }

  // FORMAT 2: "2 Inter 35..." or "1. Roma" - numbered rows
  // Extract pairs, renumber sequentially, deduplicate by normalized name
  var pairs=[];
  var SKIP2=/^(w|d|l|gf|ga|gd|pts|pld|mp|p|g|f|a|n|diff|gls|pos|rank)$/i;
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var m=l.match(/^(\d{1,2})[\s.)]+([A-Za-z\u00C0-\u024F][A-Za-z\u00C0-\u024F\s'.&-]{1,26})/);
    if(m){
      var p=parseInt(m[1]);
      var raw=m[2].trim();
      var name=raw.split(/\s{2,}|\t|\s\d/)[0].trim();
      if(name.length>1&&p>=1&&p<=50&&!SKIP2.test(name))pairs.push({p:p,n:name.toLowerCase()});
    }
  }
  if(pairs.length>2){
    pairs.sort(function(a,b){return a.p-b.p;});
    var seen2={};
    for(var i=0;i<pairs.length;i++){
      var nm2=pairs[i].n;
      var isDup2=false;
      var eKeys=Object.keys(result);
      for(var ei=0;ei<eKeys.length;ei++){if(isSameTeam(nm2,eKeys[ei])){isDup2=true;break;}}
      if(!isDup2){result[nm2]=pos++;}
    }
    if(Object.keys(result).length>2)return{standings:result,total:Object.keys(result).length};
    result={};pos=1;
  }

  // FORMAT 2B: Diretta.it style — position "1." on one line, name on next
  if(Object.keys(result).length<=2){
    result={};pos=1;
    var pendingPos=null;
    for(var i=0;i<lines.length;i++){
      var l2b=lines[i];
      var pm=l2b.match(/^(\d{1,2})\.$/);  // matches "1." "14." etc
      if(pm){pendingPos=parseInt(pm[1]);continue;}
      if(pendingPos!==null){
        var nm2b=l2b.match(/^([A-Z][A-Za-z\u00C0-\u024F\s'.&-]{1,25})$/);
        if(nm2b){
          var name2b=nm2b[1].trim().toLowerCase();
          var isDup2b=false;
          var ek2b=Object.keys(result);
          for(var ei=0;ei<ek2b.length;ei++){if(isSameTeam(name2b,ek2b[ei])){isDup2b=true;break;}}
          if(!isDup2b&&name2b.length>1)result[name2b]=pendingPos;
        }
        pendingPos=null;
      }
    }
    if(Object.keys(result).length>2){
      // Renumber sequentially
      var r2bKeys=Object.keys(result).sort(function(a,b){return result[a]-result[b];});
      var r2bNew={};for(var ri=0;ri<r2bKeys.length;ri++)r2bNew[r2bKeys[ri]]=ri+1;
      return{standings:r2bNew,total:r2bKeys.length};
    }
    result={};pos=1;
  }

  // FORMAT 3: sequential names — lines starting with capital letter
  var SKIP3=/^(squadra|team|club|pts|pld|mp|gf|ga|gd|diff|gls|ultime|rank|pos|form|serie|classifica|campionato|coppa|lega|stagione|totale|giornata|data|competizione|gruppo|gironi)$/i;
  var seen3={};
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(/^\d+$/.test(l)||l.length<3)continue;
    // Skip pure stat lines
    if(/^[+\-]\d+$/.test(l)||/^\d+:\d+$/.test(l))continue;
    var m=l.match(/^([A-Z][A-Za-z\u00C0-\u024F\s'.&-]{2,28})(?:\s+\d.*)?$/);
    if(m){
      var name=m[1].trim().split(/\s{2,}/)[0].trim();
      var fw=name.split(/\s+/)[0];
      if(SKIP3.test(fw)||SKIP3.test(name))continue;
      if(name.length<3||name.length>30)continue;
      var nm3=name.toLowerCase();
      var isDup3=false;
      var eKeys3=Object.keys(result);
      for(var ei=0;ei<eKeys3.length;ei++){if(isSameTeam(nm3,eKeys3[ei])){isDup3=true;break;}}
      if(!isDup3){result[nm3]=pos++;}
    }
  }
  if(Object.keys(result).length>2)return{standings:result,total:pos-1};

  return{standings:{},total:0};
}

function findPos(name,standings){
  if(!name||!standings)return 0;
  var low=name.toLowerCase().trim();
  if(standings[low])return standings[low];
  var keys=Object.keys(standings);
  for(var i=0;i<keys.length;i++){var k=keys[i];if(low.length>=4&&k.indexOf(low.slice(0,4))>=0)return standings[k];if(k.length>=4&&low.indexOf(k.slice(0,4))>=0)return standings[k];}
  return 0;
}

function applyStand(standings,total){
  S.standings=standings;S.tot=total;
  if(S.tA.name){S.tA.pos=findPos(S.tA.name,standings)||0;S.tA.tot=total;}
  if(S.tB.name){S.tB.pos=findPos(S.tB.name,standings)||0;S.tB.tot=total;}
  [S.tA,S.tB].forEach(function(team){team.matches.forEach(function(m){if(m.avv)m.posAvv=findPos(m.avv,standings)||0;});});
  save();
}

/* MATH */
function poisson(L,k){if(L<=0)return k===0?1:0;var r=Math.exp(-L);for(var i=1;i<=k;i++)r*=L/i;return r;}
function wAvg(v){var w=[1,.9,.82,.74,.66,.58,.50,.42],sv=0,sw=0;for(var i=0;i<v.length&&i<w.length;i++){sv+=v[i]*w[i];sw+=w[i];}return sw?sv/sw:0;}
function calcMom(gf,gs){var r=0,o=0;for(var i=0;i<3;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;r+=p;}for(var i=3;i<6;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;o+=p;}return o===0?(r?100:0):(r-o)/o*100;}
function calc1X2(xA,xB){var p1=0,pX=0,p2=0;for(var i=0;i<=7;i++)for(var j=0;j<=7;j++){var p=poisson(xA,i)*poisson(xB,j);if(i>j)p1+=p;else if(i===j)pX+=p;else p2+=p;}var t=p1+pX+p2;return t?{p1:p1/t*100,pX:pX/t*100,p2:p2/t*100}:{p1:33,pX:33,p2:34};}
function calcGoals(xA,xB){var t=xA+xB;return{o05:(1-poisson(t,0))*100,o15:(1-poisson(t,0)-poisson(t,1))*100,o25:(1-poisson(t,0)-poisson(t,1)-poisson(t,2))*100,o35:(1-poisson(t,0)-poisson(t,1)-poisson(t,2)-poisson(t,3))*100,btts:(1-poisson(xA,0))*(1-poisson(xB,0))*100};}
function calcRange(xA,xB,lo,hi){var p=0;for(var i=0;i<=9;i++)for(var j=0;j<=9;j++)if(i+j>=lo&&i+j<=hi)p+=poisson(xA,i)*poisson(xB,j);return p*100;}
function dixonColes(i,j,xA,xB,rho){
  var tau=1;
  if(i===0&&j===0)tau=1-xA*xB*rho;
  else if(i===1&&j===0)tau=1+xB*rho;
  else if(i===0&&j===1)tau=1+xA*rho;
  else if(i===1&&j===1)tau=1-rho;
  return Math.max(0.01,tau);
}
function calcCS(xA,xB){
  var rho=-0.13,sc=[],tot=0;
  for(var i=0;i<=5;i++)for(var j=0;j<=5;j++){
    var p=poisson(xA,i)*poisson(xB,j)*dixonColes(i,j,xA,xB,rho);
    sc.push({s:i+'-'+j,p:p,w:i>j?'A':i<j?'B':'X'});tot+=p;
  }
  if(tot>0)for(var k=0;k<sc.length;k++)sc[k].p=sc[k].p/tot*100;
  sc.sort(function(a,b){return b.p-a.p;});return sc.slice(0,8);
}
function calcSoS(posAvv,tot){var v=posAvv.filter(function(p){return p>0&&p<=tot;});if(!v.length)return{sos:.5,comp:0};return{sos:v.reduce(function(a,b){return a+b;},0)/v.length/tot,comp:v.length/8};}

function analyzeTeam(t){
  var m=t.matches,gf=[],gs=[],ct=[],posAvv=[];
  for(var i=0;i<m.length;i++){gf.push(m[i].gf);gs.push(m[i].gs);ct.push(m[i].ct);posAvv.push(m[i].posAvv);}
  var V=0,P=0;for(var i=0;i<gf.length;i++){if(gf[i]>gs[i])V++;else if(gf[i]===gs[i])P++;}
  var L=gf.length-V-P,pts=V*3+P;
  var iC=[],iT=[];for(var i=0;i<ct.length;i++){ct[i]==='C'?iC.push(i):iT.push(i);}
  var avg=function(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:0;};
  var gfC=iC.map(function(i){return gf[i];}),gsC=iC.map(function(i){return gs[i];});
  var gfT=iT.map(function(i){return gf[i];}),gsT=iT.map(function(i){return gs[i];});
  var mgfP=wAvg(gf),mgsP=wAvg(gs),mom=calcMom(gf,gs);
  var sos=calcSoS(posAvv,t.tot||20);
  var cleanS=0,bttsH=0,o25H=0;
  for(var i=0;i<gf.length;i++){if(gs[i]===0)cleanS++;if(gf[i]>0&&gs[i]>0)bttsH++;if(gf[i]+gs[i]>2)o25H++;}
  var posN=t.pos>0&&t.tot>1?1-(t.pos-1)/(t.tot-1):.5;
  var w=WW[t.comp]||WW.camp;
  var score=(pts/18)*w.f+posN*w.p+(mgfP/3)*w.a+(1-mgsP/3)*w.d+((mom+100)/200)*w.m;
  if(sos.comp>.5)score+=(1-sos.sos)*.05;
  score=Math.max(0,Math.min(1,score));
  if(t.comp==='amich')score=score*.7+.15;
  var varG=0,mG=avg(gf);for(var i=0;i<gf.length;i++)varG+=(gf[i]-mG)*(gf[i]-mG);varG/=Math.max(gf.length,1);
  var cf=50;if(varG<1)cf+=15;else if(varG>3)cf-=15;cf+=sos.comp*20;cf+=Math.abs(mom)>50?15:Math.abs(mom)>20?8:0;cf+=Math.min(iC.length,iT.length)*2;cf=Math.max(0,Math.min(100,Math.round(cf)));
  var esiti=[];for(var i=0;i<gf.length;i++)esiti.push(gf[i]>gs[i]?'V':gf[i]===gs[i]?'P':'S');
  // Trend: pts last 3 vs pts games 4-8
  var pts3=0,pts5=0;
  for(var i=0;i<3&&i<gf.length;i++){pts3+=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;}
  for(var i=3;i<gf.length;i++){pts5+=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;}
  var pxg3=gf.length>0?pts3/3:0; // pts per game last 3
  var pxg5=gf.length>3?pts5/(gf.length-3):pxg3; // pts per game older
  var trendVal=pxg3-pxg5; // positive = improving
  var trendStr=trendVal>0.4?'↑↑':trendVal>0.15?'↑':trendVal<-0.4?'↓↓':trendVal<-0.15?'↓':'→';
  return{V:V,P:P,L:L,pts:pts,gf:gf,gs:gs,ct:ct,posAvv:posAvv,mgfP:mgfP,mgsP:mgsP,agf:avg(gf),ags:avg(gs),agfC:avg(gfC),agsC:avg(gsC),agfT:avg(gfT),agsT:avg(gsT),mom:mom,sos:sos,score:score,conf:cf,cleanS:cleanS,bttsH:bttsH,o25H:o25H,esiti:esiti,matches:m,pos:t.pos,tot:t.tot,trend:trendStr,trendVal:trendVal};
}

function runAnalysis(){
  var a=analyzeTeam(S.tA),b=analyzeTeam(S.tB);
  var nA=S.tA.name||'Casa',nB=S.tB.name||'Trasferta';
  var xA=Math.max(.15,(a.agfC||a.mgfP)*.6+(b.agsT||b.mgsP)*.4);
  var xB=Math.max(.15,(b.agfT||b.mgfP)*.6+(a.agsC||a.mgsP)*.4);
  var probs=calc1X2(xA,xB),goals=calcGoals(xA,xB);
  var o25b=goals.o25*.65+(a.o25H+b.o25H)/16*100*.35;
  var bttsb=goals.btts*.65+(a.bttsH+b.bttsH)/16*100*.35;
  var dc1X=probs.p1+probs.pX,dcX2=probs.p2+probs.pX;
  var cM=Math.round((a.conf+b.conf)/2),cL=cM>=70?'H':cM>=45?'M':'L';
  var mO=probs.p1>=probs.pX&&probs.p1>=probs.p2?'1':probs.pX>=probs.p2?'X':'2';
  var mP=mO==='1'?probs.p1:mO==='X'?probs.pX:probs.p2;
  var cs=calcCS(xA,xB);
  var mgRanges=[[1,2],[1,3],[1,4],[1,5],[1,6],[2,3],[2,4],[2,5],[2,6],[3,4],[3,5],[3,6],[4,5],[4,6],[5,6]];
  var mg=[];for(var i=0;i<mgRanges.length;i++)mg.push({r:mgRanges[i][0]+'-'+mgRanges[i][1],p:calcRange(xA,xB,mgRanges[i][0],mgRanges[i][1])});
  var tgA05=(1-poisson(xA,0))*100,tgA15=(1-poisson(xA,0)-poisson(xA,1))*100;
  var tgB05=(1-poisson(xB,0))*100,tgB15=(1-poisson(xB,0)-poisson(xB,1))*100;
  var now=new Date();
  var ts=now.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  // Regression to mean warning
  var regWarnA=a.agf>2.8||a.agf<0.4||a.ags>2.8;
  var regWarnB=b.agf>2.8||b.agf<0.4||b.ags>2.8;
  var regWarn=regWarnA||regWarnB;
  AN={nA:nA,nB:nB,a:a,b:b,regWarn:regWarn,regWarnA:regWarnA,regWarnB:regWarnB,xA:xA,xB:xB,probs:probs,goals:goals,o25b:o25b,bttsb:bttsb,dc1X:dc1X,dcX2:dcX2,cM:cM,cL:cL,mO:mO,mP:mP.toFixed(0),mQ:(100/mP).toFixed(2),cs:cs,mg:mg,tgA05:tgA05,tgA15:tgA15,tgB05:tgB05,tgB15:tgB15,comp:S.tA.comp,ts:ts};
  save();go('analisi');
}

/* HELPERS */
function f1(v,d){d=d||1;if(v===null||v===undefined||isNaN(v))return '—';return parseFloat(v).toFixed(d);}
function pc(p){return p>=70?'var(--pos)':p>=55?'var(--accent)':p>=40?'#f4a261':'var(--neg)';}
function pf(p){return Math.max(4,Math.min(96,p))+'%';}

function buildInsights(d){
  var ins=[];
  if(d.probs.p1>70&&d.a.score>d.b.score+.12)ins.push({ico:'💎',txt:'<strong>Value Bet 1 ('+d.nA+')</strong>: '+f1(d.probs.p1)+'% — quota implicita '+f1(100/d.probs.p1,2)+'.'});
  else if(d.probs.p2>70&&d.b.score>d.a.score+.12)ins.push({ico:'💎',txt:'<strong>Value Bet 2 ('+d.nB+')</strong>: '+f1(d.probs.p2)+'% — quota implicita '+f1(100/d.probs.p2,2)+'.'});
  if(d.o25b>75)ins.push({ico:'⚽',txt:'<strong>Over 2.5</strong> molto probabile ('+f1(d.o25b)+'%). xG totale '+f1(d.xA+d.xB,2)+'.'});
  else if(d.o25b<30)ins.push({ico:'🔒',txt:'<strong>Under 2.5</strong> favorita ('+f1(100-d.o25b)+'%). Partita tattica.'});
  if(d.bttsb>68)ins.push({ico:'🥅',txt:'<strong>Gol Gol</strong>: '+f1(d.bttsb)+'%. '+d.nA+' segna '+d.a.bttsH+'/8, '+d.nB+' segna '+d.b.bttsH+'/8.'});
  if(d.dc1X>84)ins.push({ico:'🛡️',txt:'<strong>DC 1X</strong>: '+f1(d.dc1X)+'%. '+d.nA+' difficilmente perde.'});
  else if(d.dcX2>84)ins.push({ico:'🛡️',txt:'<strong>DC X2</strong>: '+f1(d.dcX2)+'%. '+d.nB+' difficilmente perde.'});
  var dm=d.a.mom-d.b.mom;
  if(Math.abs(dm)>55){var sq=dm>0?d.nA:d.nB;ins.push({ico:'📈',txt:'<strong>'+sq+'</strong> in grande crescita di forma nelle ultime 8.'});}
  if(d.probs.pX>34&&Math.abs(d.a.score-d.b.score)<.08)ins.push({ico:'⚖️',txt:'<strong>Pareggio plausibile</strong> ('+f1(d.probs.pX)+'%): squadre molto equilibrate.'});
  if(d.comp==='amich')ins.push({ico:'⚠️',txt:'<strong>Amichevole</strong>: alta incertezza — considera rotazioni e motivazione.'});
  if(d.cM<45)ins.push({ico:'⚠️',txt:'<strong>Confidence bassa</strong> ('+d.cM+'%): dati scarsi o inconsistenti.'});
  return ins.slice(0,6);
}

function getStoricoBetStats(){
  // Categorize storico bets to get per-market stats
  var stats={};
  var cats=['1','X','2','over25','under25','btts','noG','dc','handicap'];
  cats.forEach(function(c){stats[c]={n:0,w:0};});
  STOR.forEach(function(s){
    if(!s.bet||!s.esito||(s.esito!=='V'&&s.esito!=='P'))return;
    var bet=s.bet.toLowerCase();
    var mk=null;
    if(/\b1\b|\bcasa\b|\bhome\b/.test(bet))mk='1';
    else if(/\bx\b|\bpareggio\b|\bdraw\b/.test(bet))mk='X';
    else if(/\b2\b|\btrasferta\b|\baway\b/.test(bet))mk='2';
    else if(/over.?2\.?5|o2\.?5/.test(bet))mk='over25';
    else if(/under.?2\.?5|u2\.?5/.test(bet))mk='under25';
    else if(/btts|gol.?gol|\bgg\b/.test(bet))mk='btts';
    else if(/no.?gol|\bng\b/.test(bet))mk='noG';
    else if(/dc|doppia/.test(bet))mk='dc';
    else if(/handicap|\bah\b/.test(bet))mk='handicap';
    if(mk&&stats[mk]){stats[mk].n++;if(s.esito==='V')stats[mk].w++;}
  });
  return stats;
}
function getEvAlert(marketKey,stats){
  // marketKey: 'over25','btts' etc
  // Returns: '' | '⚠️' | '✅'
  var s=stats[marketKey];
  if(!s||s.n<3)return ''; // not enough data
  var sr=s.w/s.n;
  if(sr<0.35)return '<span title="Storico: '+s.w+'/'+s.n+' ('+Math.round(sr*100)+'%) — performance scarsa" style="cursor:help">⚠️</span>';
  if(sr>=0.60)return '<span title="Storico: '+s.w+'/'+s.n+' ('+Math.round(sr*100)+'%) — ottima performance" style="cursor:help">✅</span>';
  return '';
}
function calcEV(inp){
  var pv=parseFloat(inp.getAttribute('data-pv'));
  var q=parseFloat(inp.value);
  var id=inp.id;
  var el=document.getElementById(id+'_ev');
  if(!el)return;
  if(!q||q<1.01||!pv){el.textContent='—';el.style.color='var(--muted)';updateKelly();return;}
  var ev=(pv*q-1)*100;
  el.textContent=(ev>=0?'+':'')+ev.toFixed(1)+'%';
  el.style.color=ev>2?'var(--pos)':ev>0?'var(--accent)':ev>-3?'#f4a261':'var(--neg)';
  updateKelly();
}
function updateKelly(){
  var br=parseFloat((document.getElementById('kellyBR')||{}).value)||0;
  var half=(document.getElementById('halfK')||{}).checked!==false;
  var out=document.getElementById('kellyOut');
  if(!out)return;
  if(!br){out.textContent='Inserisci il bankroll per vedere le puntate consigliate.';out.style.color='var(--dim)';return;}
  var rows=document.querySelectorAll('#evTable tbody tr');
  var suggestions=[];
  rows.forEach(function(row){
    var inp=row.querySelector('input');
    var evEl=row.querySelector('td:last-child');
    var nameEl=row.querySelector('td:first-child');
    if(!inp||!evEl||evEl.textContent==='—')return;
    var ev=parseFloat(evEl.textContent);
    if(isNaN(ev)||ev<=0)return;
    var q=parseFloat(inp.value);if(!q||q<1.01)return;
    var pv=parseFloat(inp.getAttribute('data-pv'));if(!pv)return;
    var b=q-1;if(b<=0)return;
    var f=(pv*q-1)/b;
    if(half)f/=2;
    f=Math.max(0,Math.min(f,0.25));
    var stake=(br*f).toFixed(2);
    suggestions.push({name:(nameEl?nameEl.textContent:''),ev:ev.toFixed(1),f:(f*100).toFixed(1),stake:stake,q:q});
  });
  if(!suggestions.length){out.innerHTML='Nessun mercato con EV positivo.';out.style.color='var(--dim)';return;}
  var html='<div style="font-weight:700;color:var(--text);margin-bottom:6px">Puntate consigliate'+(half?' (Half-Kelly)':' (Full Kelly)')+':</div>';
  suggestions.forEach(function(s){
    html+='<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px">';
    html+='<span style="flex:1">'+s.name+'</span>';
    html+='<span style="color:var(--pos)">+'+s.ev+'%</span>';
    html+='<span style="color:var(--muted)">'+s.f+'%</span>';
    html+='<span style="background:var(--accent);color:#0c0c12;padding:2px 8px;border-radius:5px;font-weight:700">€'+s.stake+'</span>';
    html+='</div>';
  });
  out.innerHTML=html;out.style.color='var(--text)';
}

/* STORICO */
function renderStorAnalysis(){
  var settled=STOR.filter(function(s){return s.esito==='V'||s.esito==='P';});
  if(settled.length<3)return '';
  var h='';

  // === Analisi per fascia di quota ===
  var bands=[{l:1.0,u:1.49,lbl:'Bassa (1.00-1.49)'},{l:1.5,u:1.99,lbl:'Media (1.50-1.99)'},{l:2.0,u:2.99,lbl:'Alta (2.00-2.99)'},{l:3.0,u:99,lbl:'Lunga (3.00+)'}];
  var bandData=bands.map(function(b){
    var s=settled.filter(function(e){var q=parseFloat(e.quota);return q&&q>=b.l&&q<b.u;});
    var w=s.filter(function(e){return e.esito==='V';});
    return{lbl:b.l,label:b.lbl,n:s.length,w:w.length};
  }).filter(function(b){return b.n>0;});

  if(bandData.length>1){
    h+='<div class="card"><div class="cl">📊 Analisi per Fascia di Quota</div>';
    h+='<table style="width:100%;border-collapse:collapse;font-size:12px">';
    h+='<thead><tr>';
    ['Fascia','Giocate','Vinte','Strike%','ROI est.'].forEach(function(th){
      h+='<th style="background:var(--s3);padding:5px 8px;text-align:'+(th==='Fascia'?'left':'center')+';font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted)">'+th+'</th>';
    });
    h+='</tr></thead><tbody>';
    bandData.forEach(function(b){
      var sr=b.n>0?(b.w/b.n*100).toFixed(0)+'%':'—';
      // ROI: need quota for this band
      var bs=settled.filter(function(e){var q=parseFloat(e.quota);return q&&q>=b.lbl&&q<(b.lbl<3?b.lbl+0.5:99);});
      var bW=bs.filter(function(e){return e.esito==='V';});
      var bRoi=bs.length>0?((bW.reduce(function(s,e){return s+parseFloat(e.quota||1);},0)-bs.length)/bs.length*100).toFixed(1):null;
      var srNum=b.n>0?b.w/b.n:0;
      var srColor=srNum>=0.55?'var(--pos)':srNum>=0.4?'var(--accent)':'var(--neg)';
      h+='<tr>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04)">'+b.label+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center">'+b.n+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center">'+b.w+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;font-weight:700;color:'+srColor+'">'+sr+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;color:'+(bRoi&&parseFloat(bRoi)>=0?'var(--pos)':'var(--neg)')+'">'+(bRoi?bRoi+'%':'—')+'</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }

  // === Analisi per mercato (dalla scommessa inserita) ===
  var mkMap={};
  settled.forEach(function(s){
    if(!s.bet||!s.bet.trim())return;
    // Try to categorize the bet
    var bet=s.bet.toLowerCase();
    var mk='Altro';
    if(/1|casa|home/.test(bet))mk='1 (Casa)';
    else if(/x|pareggio|draw/.test(bet))mk='X (Pareggio)';
    else if(/2|trasferta|away/.test(bet))mk='2 (Trasferta)';
    else if(/over.?2\.?5|o2\.?5/.test(bet))mk='Over 2.5';
    else if(/under.?2\.?5|u2\.?5/.test(bet))mk='Under 2.5';
    else if(/over.?1\.?5|o1\.?5/.test(bet))mk='Over 1.5';
    else if(/btts|gol.?gol|gg/.test(bet))mk='BTTS';
    else if(/no.?gol|ng/.test(bet))mk='No Gol';
    else if(/dc|doppia/.test(bet))mk='Doppia Chance';
    else if(/\+[0-9]|handicap|ah/.test(bet))mk='Handicap';
    if(!mkMap[mk])mkMap[mk]={n:0,w:0,profit:0};
    mkMap[mk].n++;
    if(s.esito==='V'){mkMap[mk].w++;var q=parseFloat(s.quota);if(q)mkMap[mk].profit+=q-1;}
    else mkMap[mk].profit-=1;
  });
  var mkArr=Object.keys(mkMap).map(function(k){return{mk:k,n:mkMap[k].n,w:mkMap[k].w,p:mkMap[k].profit};}).filter(function(x){return x.n>0;}).sort(function(a,b){return b.n-a.n;});

  if(mkArr.length>0){
    h+='<div class="card"><div class="cl">🎯 Analisi per Tipo di Scommessa</div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Basato su testo inserito nel campo Scommessa. Categorizzazione automatica.</div>';
    h+='<table style="width:100%;border-collapse:collapse;font-size:12px">';
    h+='<thead><tr>';
    ['Mercato','N','✅','SR%','Profitto'].forEach(function(th){
      h+='<th style="background:var(--s3);padding:5px 8px;text-align:'+(th==='Mercato'?'left':'center')+';font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted)">'+th+'</th>';
    });
    h+='</tr></thead><tbody>';
    mkArr.forEach(function(m){
      var sr=m.n>0?(m.w/m.n*100).toFixed(0)+'%':'—';
      var srC=m.n>0&&m.w/m.n>=0.55?'var(--pos)':m.n>0&&m.w/m.n>=0.4?'var(--accent)':'var(--neg)';
      var profC=m.p>=0?'var(--pos)':'var(--neg)';
      h+='<tr>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-weight:600">'+m.mk+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center">'+m.n+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center">'+m.w+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;font-weight:700;color:'+srC+'">'+sr+'</td>';
      h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;font-weight:700;color:'+profC+'">'+(m.p>=0?'+':'')+m.p.toFixed(1)+'u</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }

  // === Trend mensile ===
  var monthly={};
  settled.forEach(function(s){
    if(!s.ts)return;
    var parts=s.ts.split(/[/\- :]/);
    if(parts.length<3)return;
    var key=parts[1]+'/'+parts[2]; // mm/yyyy
    if(!monthly[key])monthly[key]={n:0,w:0};
    monthly[key].n++;if(s.esito==='V')monthly[key].w++;
  });
  var mArr=Object.keys(monthly).sort().slice(-6); // last 6 months
  if(mArr.length>=2){
    h+='<div class="card"><div class="cl">📈 Trend Ultimi Mesi</div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    mArr.forEach(function(m){
      var d=monthly[m];
      var sr=d.n>0?(d.w/d.n*100).toFixed(0):'0';
      var c=d.n>0&&d.w/d.n>=0.55?'var(--pos)':d.n>0&&d.w/d.n>=0.4?'var(--accent)':'var(--neg)';
      h+='<div style="background:var(--s2);border-radius:var(--rs);padding:8px 12px;border:1px solid var(--border);text-align:center;min-width:70px">';
      h+='<div style="font-size:10px;color:var(--muted)">'+m+'</div>';
      h+='<div style="font-size:18px;font-weight:800;color:'+c+'">'+sr+'%</div>';
      h+='<div style="font-size:10px;color:var(--dim)">'+d.w+'/'+d.n+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // === Insight automatici ===
  var insights=[];
  if(settled.length>=5){
    // Best/worst odds range
    var bestBand=bandData.filter(function(b){return b.n>=2;}).sort(function(a,b){return (b.n>0?b.w/b.n:0)-(a.n>0?a.w/a.n:0);})[0];
    if(bestBand&&bestBand.n>=2){
      var bsr=(bestBand.w/bestBand.n*100).toFixed(0);
      if(parseInt(bsr)>=60)insights.push('💎 La tua fascia di quota più redditizia è <strong>'+bestBand.label+'</strong> con '+bsr+'% di successo.');
    }
    // Over/under performance
    var overBets=settled.filter(function(s){return s.bet&&/over/i.test(s.bet);});
    var overW=overBets.filter(function(s){return s.esito==='V';});
    if(overBets.length>=3){
      var overSR=(overW.length/overBets.length*100).toFixed(0);
      var overTxt=parseInt(overSR)>=60?'particolarmente forte sugli Over ('+overSR+'% SR)':parseInt(overSR)<=35?'da rivedere la strategia Over ('+overSR+'% SR, sotto la media)':'nella media sugli Over';
      insights.push('⚽ Sei '+overTxt+'.');
    }
    // Recent form
    var recent=settled.slice(0,5);
    var recentW=recent.filter(function(s){return s.esito==='V';}).length;
    if(recentW>=4)insights.push('🔥 Stai attraversando un periodo positivo: '+recentW+'/5 nelle ultime 5 scommesse chiuse.');
    else if(recentW<=1)insights.push('⚠️ Periodo difficile: '+recentW+'/5 nelle ultime 5. Considera di ridurre la dimensione delle puntate.');
  }
  if(insights.length){
    h+='<div class="card"><div class="cl">💡 Spunti dal tuo Storico</div>';
    insights.forEach(function(ins){h+='<div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;line-height:1.5">'+ins+'</div>';});
    h+='</div>';
  }

  return h;
}

function saveSt(){
  if(!AN)return;
  var e={};for(var k in AN)e[k]=AN[k];
  // Save EV quotes from current inputs
  var evSaved={};
  var evIds=['ev_1','ev_X','ev_2','ev_o25','ev_u25','ev_btts','ev_nog','ev_1x','ev_x2'];
  var evNames=['1','X','2','O2.5','U2.5','BTTS','NoG','1X','X2'];
  for(var i=0;i<evIds.length;i++){
    var inp=document.getElementById(evIds[i]);
    var evEl=document.getElementById(evIds[i]+'_ev');
    if(inp&&inp.value&&parseFloat(inp.value)>1&&evEl&&evEl.textContent&&evEl.textContent!=='—'){
      evSaved[evNames[i]]={q:parseFloat(inp.value).toFixed(2),ev:evEl.textContent};
    }
  }
  e.evSaved=evSaved;
  e.bet='';e.quota='';e.risultato='';e.esito='';
  STOR.unshift(e);save();alert('Salvata!');
}
