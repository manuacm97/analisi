<style>

body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:15px;line-height:1.4;min-height:100vh;padding-bottom:74px;-webkit-font-smoothing:antialiased}

.logo{font-size:17px;font-weight:900;color:var(--accent);flex:1}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(22,22,32,.98);border-top:1px solid var(--border);display:flex;height:64px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--dim);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;background:none;padding:0;transition:color .2s}
.nb.on{color:var(--accent)}.ni{font-size:20px;line-height:1}
.tab{display:none}.tab.on{display:block}
.ct{padding:14px 14px 4px;max-width:580px;margin:0 auto}
.card{background:var(--s1);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.pos{color:var(--pos)}.neg{color:var(--neg)}.acc{color:var(--accent)}.blu{color:var(--blue)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px}
.st{background:var(--s2);border-radius:var(--rs);padding:10px 12px}
.sl{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:2px}.sv{font-size:17px;font-weight:700}
.ss{font-size:10px;color:var(--dim);margin-top:2px;line-height:1.4}
.il{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}

textarea{resize:vertical;font-size:12px;font-family:'SF Mono',monospace;line-height:1.5}
.ig{margin-bottom:9px}.ir{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 15px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,transform .1s;white-space:nowrap;font-family:inherit}
.btn:active{opacity:.8;transform:scale(.97)}
.ba{background:var(--accent);color:#0c0c12}.bg2{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.bd{background:var(--nd);color:var(--neg);border:1px solid rgba(224,92,92,.3)}
.bsm{padding:6px 11px;font-size:13px}.bxs{padding:4px 8px;font-size:12px;font-weight:700}
.bfu{width:100%;display:flex}.br{display:flex;gap:6px;flex-wrap:wrap}
.al{padding:10px 12px;border-radius:var(--rs);font-size:12px;margin-bottom:8px;line-height:1.5;font-weight:500}
.aw{background:var(--ad);border:1px solid rgba(245,166,35,.3);color:var(--accent)}
.ap{background:var(--pd);border:1px solid rgba(62,207,142,.35);color:var(--pos)}
.ai2{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted)}
.an{background:var(--nd);border:1px solid rgba(224,92,92,.35);color:var(--neg)}
.sep{height:1px;background:var(--border);margin:11px 0}
.stit{font-size:20px;font-weight:800;letter-spacing:-.6px;margin-bottom:14px}
.mht{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.mht th{background:var(--s3);padding:5px 8px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.mht td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.mht tr:last-child td{border-bottom:none}
.fd{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:800}
.fv{background:var(--pd);color:var(--pos)}.fp{background:rgba(255,255,255,.06);color:var(--muted)}.fs{background:var(--nd);color:var(--neg)}

.pbs{height:100%;border-radius:3px;transition:width .5s}
.pexp{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.4}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.gc{background:var(--s2);border-radius:var(--rs);padding:9px 11px;border:1px solid var(--border)}
.gcl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.gcv{font-size:20px;font-weight:800;letter-spacing:-.5px}
.gcb{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
.gcf{height:100%;border-radius:2px;transition:width .5s}
.gce{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.3}
.xgr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.xgl{font-size:12px;font-weight:600;min-width:90px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.xgt{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.xgf{height:100%;border-radius:4px;transition:width .5s}
.xgn{font-size:12px;font-weight:700;min-width:32px;text-align:right}
.ins{display:flex;gap:9px;padding:9px 11px;background:var(--s2);border-radius:var(--rs);margin-bottom:5px;border:1px solid var(--border)}
.ii{font-size:16px;flex-shrink:0;margin-top:1px}.it{font-size:12px;line-height:1.5}
.pred{text-align:center;padding:4px 0 12px}
.prv{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--accent)}
.prp{font-size:16px;font-weight:700;margin-top:4px}
.prl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.cb{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-top:7px}
.cH{background:var(--pd);color:var(--pos)}.cM{background:var(--ad);color:var(--accent)}.cL{background:var(--nd);color:var(--neg)}
.mgc{background:var(--s2);border-radius:var(--rs);padding:8px 10px;border:1px solid var(--border);text-align:center}
.mgl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:2px}.mgv{font-size:16px;font-weight:800}
.hc{background:var(--s2);border-radius:var(--rs);margin-bottom:4px;border:1px solid var(--border);overflow:hidden}
.hr2{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer}
.ht{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hpred{font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px;background:var(--s3);color:var(--muted);flex-shrink:0}
.heb{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.hV{background:var(--pd);color:var(--pos)}.hP{background:var(--nd);color:var(--neg)}.hN{background:var(--s3);color:var(--dim)}
.hd{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.hd.open{max-height:220px;padding:0 12px 10px}
.parea{background:var(--s3);border-radius:var(--rs);padding:12px;font-size:11px;line-height:1.6;color:var(--muted);max-height:200px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--border);margin-bottom:8px}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
</style>
</head>

var PRESET_HITS={
  '1':function(a,b){return a>b;},'X':function(a,b){return a===b;},'2':function(a,b){return b>a;},
  'over25':function(a,b){return a+b>=3;},'under25':function(a,b){return a+b<=2;},
  'btts':function(a,b){return a>0&&b>0;},'noG':function(a,b){return a===0||b===0;},
  '1X':function(a,b){return a>=b;},'X2':function(a,b){return b>=a;}

function getHitFn(id){
  if(PRESET_HITS[id])return PRESET_HITS[id];
  for(var _i=0;_i<EXTRA_MKTS.length;_i++){if(EXTRA_MKTS[_i].id===id)return EXTRA_MKTS[_i].hit||null;}
  return null;
}
function computeComboProb(ids,d){
  var fns=ids.map(function(id){return getHitFn(id);}).filter(Boolean);
  if(fns.length===0)return 0;
  var p=0;
  for(var gA=0;gA<=9;gA++)for(var gB=0;gB<=9;gB++){
    if(fns.every(function(fn){return fn(gA,gB);}))
      p+=poisson(d.xA,gA)*poisson(d.xB,gB);
  }

}

function parse7Lines(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  if(lines.length<7)return{error:'Servono almeno 7 righe (1 partita)'};
  // Auto-detect format: 9-line (new Diretta, team names duplicated) or 7-line (classic)
  // In 9-line: line[2]===line[3] (home team repeated) and line[4]===line[5] (away repeated)
  var RPP=7;
  if(lines.length>=9&&lines[2]===lines[3]&&lines[4]===lines[5])RPP=9;
  // Offset map: [homeTeam, awayTeam, goalsA, goalsB]
  var off=RPP===9?[2,4,6,7]:[2,3,4,5];
  // Find the most frequent team = the one being analysed
  var freq={};
  for(var i=0;i+off[3]<lines.length;i+=RPP){
    freq[lines[i+off[0]]]=(freq[lines[i+off[0]]]||0)+1;
    freq[lines[i+off[1]]]=(freq[lines[i+off[1]]]||0)+1;
  }
  var best=null,bestN=0;
  for(var k in freq){if(freq[k]>bestN){bestN=freq[k];best=k;}}
  if(!best)return{error:'Squadra principale non rilevata'};
  var matches=[];
  for(var i=0;i+off[3]<lines.length&&matches.length<8;i+=RPP){
    var sq1=lines[i+off[0]],sq2=lines[i+off[1]];
    var g1=parseInt(lines[i+off[2]])||0,g2=parseInt(lines[i+off[3]])||0;
    var isH=(sq1===best);
    matches.push({avv:isH?sq2:sq1,gf:isH?g1:g2,gs:isH?g2:g1,ct:isH?'C':'T',posAvv:0});
  }
  return{name:best,matches:matches};
}

    var s=n.toLowerCase()
      // Strip common club prefixes
      .replace(/^(ssc|ss|asc?|uc?|fc?|bv|bvb|shv|hfc?|rc?|gc?|cfr|fk|nk|sk|ik|svb?|tsv|tsg|rb|wfc|bsc|hsv|vfl|vfb|rcd|rsa|rsca|sd|ud|ca|ra|cf|rce|sport(?:ing)?|real|deportivo)\s+/i,'')

      .replace(/\s+(de|del|di|vom?|am|das|dos|els|las|les|los|van\s+de[rn]?)\s+\S+$/i,'')

    if(/^\d+$/.test(l)||l.length<3)continue;
    // Skip pure stat lines
    if(/^[+\-]\d+$/.test(l)||/^\d+:\d+$/.test(l))continue;
    var m=l.match(/^([A-Z][A-Za-z\u00C0-\u024F\s'.&-]{2,28})(?:\s+\d.*)?$/);
    if(m){
      var name=m[1].trim().split(/\s{2,}/)[0].trim();
      var fw=name.split(/\s+/)[0];
      if(SKIP3.test(fw)||SKIP3.test(name))continue;
      if(name.length<3||name.length>30)continue;
      var nm3=name.toLowerCase();
      var isDup3=false;
      var eKeys3=Object.keys(result);
      for(var ei=0;ei<eKeys3.length;ei++){if(isSameTeam(nm3,eKeys3[ei])){isDup3=true;break;}}
      if(!isDup3){result[nm3]=pos++;}
    }
  }
  if(Object.keys(result).length>2)return{standings:result,total:pos-1};

  return{standings:{},total:0};
}

function findPos(name,standings){
  if(!name||!standings)return 0;
  var low=name.toLowerCase().trim();
  if(standings[low])return standings[low];
  var keys=Object.keys(standings);
  for(var i=0;i<keys.length;i++){var k=keys[i];if(low.length>=4&&k.indexOf(low.slice(0,4))>=0)return standings[k];if(k.length>=4&&low.indexOf(k.slice(0,4))>=0)return standings[k];}
  return 0;
}

function applyStand(standings,total){
  S.standings=standings;S.tot=total;
  if(S.tA.name){S.tA.pos=findPos(S.tA.name,standings)||0;S.tA.tot=total;}
  if(S.tB.name){S.tB.pos=findPos(S.tB.name,standings)||0;S.tB.tot=total;}
  [S.tA,S.tB].forEach(function(team){team.matches.forEach(function(m){if(m.avv)m.posAvv=findPos(m.avv,standings)||0;});});
  save();
}

/* MATH */
function poisson(L,k){if(L<=0)return k===0?1:0;var r=Math.exp(-L);for(var i=1;i<=k;i++)r*=L/i;return r;}
function wAvg(v){var w=[1,.9,.82,.74,.66,.58,.50,.42],sv=0,sw=0;for(var i=0;i<v.length&&i<w.length;i++){sv+=v[i]*w[i];sw+=w[i];}return sw?sv/sw:0;}
function calcMomReal(m){
  var real=m.filter(function(x){return x.avv;});
  var r=0,o=0;
  for(var i=0;i<Math.min(3,real.length);i++){var p=real[i].gf>real[i].gs?3:real[i].gf===real[i].gs?1:0;r+=p;}
  for(var i=3;i<Math.min(6,real.length);i++){var p=real[i].gf>real[i].gs?3:real[i].gf===real[i].gs?1:0;o+=p;}
  return o===0?(r?100:0):(r-o)/o*100;
}

function calcMom(gf,gs){var r=0,o=0;for(var i=0;i<3;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;r+=p;}for(var i=3;i<6;i++){var p=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;o+=p;}return o===0?(r?100:0):(r-o)/o*100;}
function calc1X2(xA,xB){var p1=0,pX=0,p2=0;for(var i=0;i<=7;i++)for(var j=0;j<=7;j++){var p=poisson(xA,i)*poisson(xB,j);if(i>j)p1+=p;else if(i===j)pX+=p;else p2+=p;}var t=p1+pX+p2;return t?{p1:p1/t*100,pX:pX/t*100,p2:p2/t*100}:{p1:33,pX:33,p2:34};}
function calcGoals(xA,xB){
  var rho=-0.13,tot=new Array(20).fill(0),pbtts=0,psum=0;
  for(var i=0;i<=9;i++)for(var j=0;j<=9;j++){
    var p=poisson(xA,i)*poisson(xB,j)*Math.max(0.001,dixonColes(i,j,xA,xB,rho));
    if(i+j<20)tot[i+j]+=p;
    if(i>0&&j>0)pbtts+=p;
    psum+=p;
  }
  if(psum>0){for(var k=0;k<tot.length;k++)tot[k]/=psum;pbtts/=psum;}
  var cum=0;
  return{
    o05:(1-tot[0])*100,
    o15:(1-tot[0]-tot[1])*100,
    o25:(1-tot[0]-tot[1]-tot[2])*100,
    o35:(1-tot[0]-tot[1]-tot[2]-tot[3])*100,
    btts:pbtts*100
  };
}
function calcRange(xA,xB,lo,hi){var p=0;for(var i=0;i<=9;i++)for(var j=0;j<=9;j++)if(i+j>=lo&&i+j<=hi)p+=poisson(xA,i)*poisson(xB,j);return p*100;}
function dixonColes(i,j,xA,xB,rho){
  var tau=1;
  if(i===0&&j===0)tau=1-xA*xB*rho;
  else if(i===1&&j===0)tau=1+xB*rho;
  else if(i===0&&j===1)tau=1+xA*rho;
  else if(i===1&&j===1)tau=1-rho;
  return Math.max(0.01,tau);
}
function calcCS(xA,xB){
  var rho=-0.13,sc=[],tot=0;
  for(var i=0;i<=5;i++)for(var j=0;j<=5;j++){
    var p=poisson(xA,i)*poisson(xB,j)*dixonColes(i,j,xA,xB,rho);
    sc.push({s:i+'-'+j,p:p,w:i>j?'A':i<j?'B':'X'});tot+=p;
  }
  if(tot>0)for(var k=0;k<sc.length;k++)sc[k].p=sc[k].p/tot*100;
  sc.sort(function(a,b){return b.p-a.p;});return sc.slice(0,8);
}
function calcSoS(posAvv,tot){var v=posAvv.filter(function(p){return p>0&&p<=tot;});if(!v.length)return{sos:.5,comp:0};return{sos:v.reduce(function(a,b){return a+b;},0)/v.length/tot,comp:v.length/8};}

function analyzeTeam(t){
  var m=t.matches;
  var gf=[],gs=[],ct=[],posAvv=[];
  for(var i=0;i<m.length;i++){gf.push(m[i].gf);gs.push(m[i].gs);ct.push(m[i].ct);posAvv.push(m[i].posAvv);}

  // *** FIX: skip empty match slots (avv='') in all calculations ***
  var nReal=0;for(var i=0;i<m.length;i++)if(m[i].avv)nReal++;

  var avg=function(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:0;};

  // V/P/L/pts - skip empty
  var V=0,P=0;
  for(var i=0;i<gf.length;i++){
    if(!m[i].avv)continue;
    if(gf[i]>gs[i])V++;else if(gf[i]===gs[i])P++;
  }
  var L=nReal-V-P,pts=V*3+P;

  // Home/away split - skip empty (empty slots default to ct='C', would distort stats)
  var iC=[],iT=[];
  for(var i=0;i<m.length;i++){
    if(!m[i].avv)continue;
    m[i].ct==='C'?iC.push(i):iT.push(i);
  }
  var gfC=iC.map(function(i){return gf[i];}),gsC=iC.map(function(i){return gs[i];});
  var gfT=iT.map(function(i){return gf[i];}),gsT=iT.map(function(i){return gs[i];});

  // Weighted avg on real games only
  var realGF=m.filter(function(x){return x.avv;}).map(function(x){return x.gf;});
  var realGS=m.filter(function(x){return x.avv;}).map(function(x){return x.gs;});
  var mgfP=wAvg(realGF),mgsP=wAvg(realGS);

  var mom=calcMomReal(m);
  var sos=calcSoS(posAvv,t.tot||20);

  // cleanS / bttsH / o25H - skip empty
  var cleanS=0,bttsH=0,o25H=0,scoredH=0;
  for(var i=0;i<gf.length;i++){
    if(!m[i].avv)continue;
    if(gs[i]===0)cleanS++;
    if(gf[i]>0&&gs[i]>0)bttsH++;
    if(gf[i]+gs[i]>2)o25H++;
    if(gf[i]>0)scoredH++;
  }

  // Trend: pts last 3 real games vs pts older real games
  var pts3=0,n3=0,pts5=0,n5=0,ri=0;
  for(var i=0;i<m.length;i++){
    if(!m[i].avv)continue;
    var pi=gf[i]>gs[i]?3:gf[i]===gs[i]?1:0;
    if(ri<3){pts3+=pi;n3++;}else{pts5+=pi;n5++;}
    ri++;
  }
  var pxg3=n3>0?pts3/n3:0,pxg5=n5>0?pts5/n5:pxg3;
  var trendVal=pxg3-pxg5;
  var trendStr=trendVal>0.4?'↑↑':trendVal>0.15?'↑':trendVal<-0.4?'↓↓':trendVal<-0.15?'↓':'→';

  var posN=t.pos>0&&t.tot>1?1-(t.pos-1)/(t.tot-1):.5;
  var w=WW[t.comp]||WW.camp;
  var score=(pts/Math.max(1,nReal*3))*w.f+posN*w.p+(mgfP/3)*w.a+(1-mgsP/3)*w.d+((mom+100)/200)*w.m;
  if(sos.comp>.5)score+=(1-sos.sos)*.05;
  score=Math.max(0,Math.min(1,score));
  // amich mode removed

  var varG=0,mG=avg(realGF);
  for(var i=0;i<realGF.length;i++)varG+=(realGF[i]-mG)*(realGF[i]-mG);
  varG/=Math.max(realGF.length,1);
  var cf=50;if(varG<1)cf+=15;else if(varG>3)cf-=15;cf+=sos.comp*20;cf+=Math.abs(mom)>50?15:Math.abs(mom)>20?8:0;cf+=Math.min(iC.length,iT.length)*2;cf=Math.max(0,Math.min(100,Math.round(cf)));

  var esiti=[];for(var i=0;i<gf.length;i++){if(!m[i].avv)continue;esiti.push(gf[i]>gs[i]?'V':gf[i]===gs[i]?'P':'S');}

  return{V:V,P:P,L:L,pts:pts,nReal:nReal,gf:gf,gs:gs,ct:ct,posAvv:posAvv,mgfP:mgfP,mgsP:mgsP,agf:avg(realGF),ags:avg(realGS),agfC:avg(gfC),agsC:avg(gsC),agfT:avg(gfT),agsT:avg(gsT),mom:mom,sos:sos,score:score,conf:cf,cleanS:cleanS,bttsH:bttsH,o25H:o25H,scoredH:scoredH,esiti:esiti,matches:m,pos:t.pos,tot:t.tot,trend:trendStr,trendVal:trendVal};
}


function runAnalysis(){
  var a=analyzeTeam(S.tA),b=analyzeTeam(S.tB);
  var nA=S.tA.name||'Casa',nB=S.tB.name||'Trasferta';
  var xA=Math.max(.15,(a.agfC||a.mgfP)*.6+(b.agsT||b.mgsP)*.4);
  var xB=Math.max(.15,(b.agfT||b.mgfP)*.6+(a.agsC||a.mgsP)*.4);
  // === COMPETITION CORRECTIONS ===
  var comp=S.tA.comp;
  // Neutral ground: remove home advantage (~0.20 goals)
  if(S.neutral){
    xA=Math.max(.15,xA-0.20);
    xB=Math.max(.15,xB+0.12);
  }
  // Club international: league quality tier adjustment
  if(comp==='euro'){
    var _TIER_Q={1:100,2:68,3:45,4:28,5:58,6:32,7:42,8:22};
    var _qA=_TIER_Q[S.tA.leagueTier||1]||50,_qB=_TIER_Q[S.tB.leagueTier||1]||50;
    var _qGap=(_qA-_qB)/100;
    if(Math.abs(_qGap)>0.05){
      xA=Math.max(.15,xA+_qGap*0.28);
      xB=Math.max(.15,xB-_qGap*0.16);
    }
  }
  // Spareggio: division level adjustment
  if(comp==='spareggio'){
    var _divDiff=(S.tB.div||1)-(S.tA.div||1);
    if(Math.abs(_divDiff)>0){
      xA=Math.max(.15,xA+_divDiff*0.20);
      xB=Math.max(.15,xB-_divDiff*0.13);
    }
  }
  // National teams: FIFA ranking adjustment
  if(comp==='naz'){
    var _rA=S.tA.fifaRank||50,_rB=S.tB.fifaRank||50;
    var _rGap=(_rB-_rA)/80;
    if(Math.abs(_rGap)>0.08){
      var _rAdj=Math.max(-0.50,Math.min(0.50,_rGap*0.28));
      xA=Math.max(.15,xA+_rAdj);
      xB=Math.max(.15,xB-_rAdj*0.60);
    }
    // Knockout stages: higher tension → tighter, fewer goals; also boost WW.m
    if((S.nazStage||0)>=3){xA=Math.max(.15,xA*0.88);xB=Math.max(.15,xB*0.88);}
    else if((S.nazStage||0)>=2){xA=Math.max(.15,xA*0.93);xB=Math.max(.15,xB*0.93);}
  }
  // Coppa/Euro stage adjustments
  if(S.tA.comp==='coppa'||S.tA.comp==='euro'){
    var _cs=S.coppaStage||0;
    // Later rounds: teams more cautious (higher stakes) → scale down goals, boost draw prob
    if(_cs>=3){// Semifinale or Finale: very cautious, low scoring
      xA=Math.max(.15,xA*0.88);xB=Math.max(.15,xB*0.88);
    }else if(_cs===2){// Quarti: slightly cautious
      xA=Math.max(.15,xA*0.94);xB=Math.max(.15,xB*0.94);
    }
  }
  // Inizio stagione: regress stats toward league mean, reduce momentum weight
  var _isISA=S.tA.inizioStagione||false,_isISB=S.tB.inizioStagione||false;
  if(_isISA||_isISB){
    var _MEAN=1.38; // league average xG per team
    if(_isISA){xA=xA*0.55+_MEAN*0.45;} // regress toward mean
    if(_isISB){xB=xB*0.55+_MEAN*0.45;}
  }
  // First leg result adjustment (coppa/spareggio/euro)
  var _fl=S.firstLeg||{};
  var _flA=parseInt(_fl.golA),_flB=parseInt(_fl.golB);
  if(!isNaN(_flA)&&!isNaN(_flB)){
    // Aggregate advantage: positive = home team leads, negative = away team leads
    var _aggAdv=_flA-_flB;
    // Team behind needs to score more → boost xG; team ahead can sit back → reduce xG
    if(_aggAdv>1){xA=Math.max(.15,xA*0.85);xB=Math.max(.15,xB*1.15);} // home leads by 2+: away must attack
    else if(_aggAdv===1){xA=Math.max(.15,xA*0.92);xB=Math.max(.15,xB*1.08);} // home leads by 1: slight away boost
    else if(_aggAdv===-1){xA=Math.max(.15,xA*1.08);xB=Math.max(.15,xB*0.92);} // away leads by 1: home boosts
    else if(_aggAdv<-1){xA=Math.max(.15,xA*1.15);xB=Math.max(.15,xB*0.85);} // away leads by 2+: home must attack
    // 0-0 draw: both need a goal, slight overall tension boost
    if(_aggAdv===0&&_flA===0){xA=Math.max(.15,xA*1.04);xB=Math.max(.15,xB*1.04);}
  }
  // === END CORRECTIONS ===
  var probs=calc1X2(xA,xB),goals=calcGoals(xA,xB);
  var nGA=a.nReal||1,nGB=b.nReal||1;
  var histO25=(a.o25H/nGA+b.o25H/nGB)/2*100;
  // BTTS: product of individual scoring rates (not arithmetic mean)
  var histBTTS=(a.scoredH/nGA)*(b.scoredH/nGB)*100;
  var o25b=goals.o25*.65+histO25*.35;
  var bttsb=goals.btts*.65+histBTTS*.35;
  var dc1X=probs.p1+probs.pX,dcX2=probs.p2+probs.pX;
  var cM=Math.round((a.conf+b.conf)/2),cL=cM>=70?'H':cM>=45?'M':'L';
  var mO=probs.p1>=probs.pX&&probs.p1>=probs.p2?'1':probs.pX>=probs.p2?'X':'2';
  var mP=mO==='1'?probs.p1:mO==='X'?probs.pX:probs.p2;
  var cs=calcCS(xA,xB);
  var mgRanges=[[1,2],[1,3],[1,4],[1,5],[1,6],[2,3],[2,4],[2,5],[2,6],[3,4],[3,5],[3,6],[4,5],[4,6],[5,6]];
  var mg=[];
  mg.push({r:'0-0',l:'0 Gol',p:calcRange(xA,xB,0,0)});
  mg.push({r:'0-1',l:'0-1 Gol',p:calcRange(xA,xB,0,1)});
  for(var i=0;i<mgRanges.length;i++)mg.push({r:mgRanges[i][0]+'-'+mgRanges[i][1],p:calcRange(xA,xB,mgRanges[i][0],mgRanges[i][1])});
  mg.push({r:'7+',l:'7+ Gol',p:Math.max(0,100-calcRange(xA,xB,0,6))});
  // Per-team multigol ranges (for analysis)
  function _ptRange(x,lo,hi){
    var p=0;for(var _k=lo;_k<=Math.min(hi,9);_k++)p+=poisson(x,_k);return p*100;
  }
  function _buildTeamMg(x){
    return[
      {r:'0',l:'0 Gol',p:poisson(x,0)*100},
      {r:'1',l:'1 Gol',p:poisson(x,1)*100},
      {r:'2',l:'2 Gol',p:poisson(x,2)*100},
      {r:'3+',l:'3+ Gol',p:Math.max(0,100-(poisson(x,0)+poisson(x,1)+poisson(x,2))*100)},
      {r:'0-1',p:_ptRange(x,0,1)},
      {r:'0-2',p:_ptRange(x,0,2)},
      {r:'1-2',p:_ptRange(x,1,2)},
      {r:'1-3',p:_ptRange(x,1,3)},
      {r:'1-4',p:_ptRange(x,1,4)},
      {r:'2-3',p:_ptRange(x,2,3)},
      {r:'2-4',p:_ptRange(x,2,4)}
    ];
  }
  var mgA=_buildTeamMg(xA);
  var mgB=_buildTeamMg(xB);
  var tgA05=(1-poisson(xA,0))*100,tgA15=(1-poisson(xA,0)-poisson(xA,1))*100;
  var tgB05=(1-poisson(xB,0))*100,tgB15=(1-poisson(xB,0)-poisson(xB,1))*100;
  var now=new Date();
  var ts=now.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  // Regression to mean warning
  var regWarnA=a.agf>2.8||a.agf<0.4||a.ags>2.8;
  var regWarnB=b.agf>2.8||b.agf<0.4||b.ags>2.8;
  var regWarn=regWarnA||regWarnB;
  AN={mgA:mgA,mgB:mgB,nA:nA,nB:nB,a:a,b:b,regWarn:regWarn,regWarnA:regWarnA,regWarnB:regWarnB,xA:xA,xB:xB,probs:probs,goals:goals,o25b:o25b,bttsb:bttsb,dc1X:dc1X,dcX2:dcX2,cM:cM,cL:cL,mO:mO,mP:mP.toFixed(0),mQ:(100/mP).toFixed(2),cs:cs,mg:mg,tgA05:tgA05,tgA15:tgA15,tgB05:tgB05,tgB15:tgB15,comp:S.tA.comp,ts:ts};
  save();go('analisi');
}

  for(var i=0;i<r.matches.length&&i<8;i++){for(var k in r.matches[i])team.matches[i][k]=r.matches[i][k];}
  var _sk=t==='A'?'standingsA':'standingsB';
  var _sfb=t==='A'?'standingsB':'standingsA';
  var _st=S[_sk]&&Object.keys(S[_sk]).length>2?S[_sk]:(S[_sfb]&&Object.keys(S[_sfb]).length>2?S[_sfb]:S.standings);

function importStandFor(idx){
  var key=idx===0?'standingsA':'standingsB';
  var txt=document.getElementById('txtStand'+idx);
  if(!txt||!txt.value.trim()){alert('Nessun testo incollato.');return;}
  var r=parseStandText(txt.value);
  if(!r||Object.keys(r.standings).length<3){alert('Classifica non riconosciuta.\nAssicurati che il testo contenga posizione e nome squadra.');return;}
  S[key]=r.standings;
  S.tot=Math.max(S.tot,r.total||20);
  // Find team position + retroactively update all posAvv in match history
  var tKey=idx===0?S.tA:S.tB;
  var found=findPos(tKey.name,r.standings);
  if(found){tKey.pos=found;tKey.tot=r.total||20;}
  // Retroactive posAvv update
  var otherKey=idx===0?S.tA:S.tB;
  var allTeams=[S.tA,S.tB];
  allTeams.forEach(function(team){
    team.matches.forEach(function(m){
      if(m.avv){var p=findPos(m.avv,r.standings);if(p)m.posAvv=p;}
    });
    if(!team.pos&&team.name){var p2=findPos(team.name,r.standings);if(p2){team.pos=p2;team.tot=r.total||20;}}
  });
  save();renderInput();
  var n=Object.keys(r.standings).length;
  var msg=n+' squadre importate.'+(found?' '+tKey.name+' trovata: #'+found+'.':' '+tKey.name+' non trovata (inserisci posizione manualmente).');
  alert(msg);
}
async function importStand(){
  var el=document.getElementById('txtStand');

  if(!el||!el.value.trim()){alert('Incolla prima il testo della classifica');return;}
  if(errEl)errEl.style.display='none';
  var txt=el.value.trim();

  // Parse text
  var r=parseStandText(txt);
  var count=Object.keys(r.standings).length;

  // DEBUG: show raw extracted link values
  var linkRe=/^\[([^\]]+)\]\(https?:\/\//;
  var lines=txt.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var rawVals=[];
  for(var i=0;i<lines.length;i++){var m=linkRe.exec(lines[i]);if(m)rawVals.push(m[1]);}
  var debugInfo='Link estratti: '+rawVals.length+'\nPrimi 15: '+rawVals.slice(0,15).join(' | ')+'\nSquadre trovate ('+count+'): ';
  if(count>0){
    var skeys2=Object.keys(r.standings).sort(function(a,b){return r.standings[a]-r.standings[b];});
    debugInfo+=skeys2.slice(0,8).map(function(k){return r.standings[k]+'.'+k;}).join(', ');
    if(skeys2.length>8)debugInfo+='...';
  }

  if(count<2){
    if(errEl){
      errEl.style.display='block';errEl.className='al an';
      errEl.innerHTML='Nessuna squadra trovata.<br><small style="font-family:monospace;word-break:break-all">'+debugInfo.replace(/\n/g,'<br>')+'</small>';
    }
    return;
  }
  applyStand(r.standings,r.total);
  el.value='';
  renderInput();
  var freshErr=document.getElementById('standErr');
  if(freshErr){
    var skeys=Object.keys(r.standings).sort(function(a,b){return r.standings[a]-r.standings[b];});
    var preview=skeys.map(function(k){return r.standings[k]+'.'+k;}).join(' | ');
    freshErr.style.display='block';freshErr.className='al ap';
    freshErr.innerHTML='<strong>'+count+' squadre:</strong><br><small style="font-family:monospace;word-break:break-all">'+preview+'</small><br><small style="color:var(--dim)">'+debugInfo.split('\n')[0]+'</small>';
  }
}

function buildGooseHtml(d,storStats){
  var h='';

  var top8=(d.cs||[]).slice(0,8).map(function(c){
    var pts=c.s.split('-');return{gA:parseInt(pts[0]),gB:parseInt(pts[1]),p:c.p,s:c.s,w:c.w};
  });

  // Build unified market list with probabilities and hit functions
  var allMkts=[];
  [{id:'1',l:'1 Casa',cat:'1',pv:d.probs.p1},
   {id:'X',l:'X Pareggio',cat:'X',pv:d.probs.pX},

   {id:'over25',l:'Over 2.5',cat:'Over 2.5',pv:d.o25b},
   {id:'under25',l:'Under 2.5',cat:'Under 2.5',pv:100-d.o25b},
   {id:'btts',l:'Gol Gol',cat:'BTTS',pv:d.bttsb},
   {id:'noG',l:'No Gol',cat:'NG',pv:100-d.bttsb},
   {id:'1X',l:'DC 1X',cat:'DC',pv:d.dc1X},
   {id:'X2',l:'DC X2',cat:'DC',pv:d.dcX2}
  ].forEach(function(m){
    var hit=getHitFn(m.id);
    if(hit)allMkts.push({id:m.id,l:m.l,cat:m.cat,pv:m.pv,hit:hit});
  });
  EXTRA_MKTS.forEach(function(m){
    if(m.hit)allMkts.push({id:m.id,l:m.l.replace('[A]',d.nA).replace('[B]',d.nB),cat:m.cat,pv:m.pv(d),hit:m.hit});
  });

  // Risk bar: 8 squares, each = one of top-8 scenarios
  function riskBar(hitFn){

  function row(name,pv,cat,hitFn,addOnclick){

    if(/^mg_/.test(id))return 'mg_tot';
    if(/^mga_/.test(id)||/^mgb_/.test(id))return 'mg_sq';
    if(/^hcp_/.test(id))return 'hcp';

  function isValidPair(ca,cb){

    }

    });
  }
  return h;
}

function addGooseMkt(id){
  if(!AN)return;
  if(!AN.customEvMkts)AN.customEvMkts=[];
  if(AN.customEvMkts.indexOf(id)>=0){alert('Gia nella tabella EV');return;}
  AN.customEvMkts.push(id);save();renderAnalisi();
}
function addGooseCombo(id1,id2){
  if(!AN)return;
  if(!AN.customEvCombos)AN.customEvCombos=[];
  var dup=AN.customEvCombos.some(function(c){return c.ids[0]===id1&&c.ids[1]===id2;});
  if(dup){alert('Combo gia nella tabella EV');return;}
  AN.customEvCombos.push({ids:[id1,id2]});save();renderAnalisi();
}

// Bet grouping helpers for Storico analysis
function _getBetSingleGroupKey(pb){
  var cat=pb.cat||'ALTRO';
  if(cat==='1'||cat==='X'||cat==='2')return'ESITO';
  if(cat==='DC1X'||cat==='DCX2'||cat==='DC12'||cat==='DNB')return'DC';
  if(cat==='OVER')return'OVER:'+pb.label;
  if(cat==='UNDER')return'UNDER:'+pb.label;
  if(cat==='MG')return'MG:'+pb.label;
  if(cat==='MG_A')return'MG_A:'+pb.label;
  if(cat==='MG_B')return'MG_B:'+pb.label;
  if(cat==='HCP')return'HCP:'+pb.label;
  if(cat==='BTTS')return'BTTS';
  if(cat==='NG')return'NG';
  if(cat==='1T'||cat==='1T_O'||cat==='1T_U')return'1T:'+pb.label;
  return cat;
}
function _getBetSingleGroupLabel(pb){
  var cat=pb.cat||'ALTRO';
  if(cat==='1'||cat==='X'||cat==='2')return'Esito Finale (1/X/2)';
  if(cat==='DC1X'||cat==='DCX2'||cat==='DC12'||cat==='DNB')return'Doppia Chance';
  if(cat==='MG_A')return pb.label||'MG Casa';
  if(cat==='MG_B')return pb.label||'MG Ospite';
  if(cat==='BTTS')return'Gol Gol';
  if(cat==='NG')return'No Gol';
  return pb.label||'Altro';
}
function _getBetTypeForCombo(pb){
  var cat=pb.cat||'ALTRO';
  if(cat==='1'||cat==='X'||cat==='2')return'Esito';
  if(cat==='DC1X'||cat==='DCX2'||cat==='DC12'||cat==='DNB')return'DC';
  if(cat==='BTTS')return'Gol Gol';
  if(cat==='NG')return'No Gol';
  if(cat==='OVER'||cat==='UNDER'||cat==='MG'||cat==='HCP')return pb.label;
  var _cl={'ESATTO':'Esatto','MARC':'Marcatore','CS':'Clean Sheet','1T':'1T','CORNER':'Corner','CARD':'Cartellini','WIN_NIL':'Win Nil','HT_FT':'P/F'};
  return _cl[cat]||pb.label||'Altro';
}
function _getGroupSortOrder(key){
  if(key==='ESITO')return 0;
  if(key==='DC')return 1;
  if(key==='BTTS')return 2;
  if(key==='NG')return 3;
  if(key.slice(0,5)==='OVER:')return 4;
  if(key.slice(0,6)==='UNDER:')return 5;
  if(key.slice(0,3)==='MG:')return 6;
  if(key.slice(0,4)==='HCP:')return 7;
  if(key.slice(0,6)==='COMBO:')return 10;
  return 8;
}

function renderStorAnalysis(){
  var settled=STOR.filter(function(s){return s.esito==='V'||s.esito==='P';});

    var roi=s.length>0?(profit/s.length*100).toFixed(1):null;

  }).filter(function(b){return b.n>0;});

  if(bandData.length>1){

    });
    h+='</tr></thead><tbody>';
    if(_stSort.fascia.col>0){bandData.sort(function(a,b){var _fcols=[null,function(x){return x.n;},function(x){return x.w;},function(x){return x.n>0?x.w/x.n:0;},function(x){return parseFloat(x.roi)||0;}];var fn=_fcols[_stSort.fascia.col];var va=fn(a),vb=fn(b);return(vb-va)*_stSort.fascia.dir;});}
    bandData.forEach(function(b){
      var sr=b.n>0?(b.w/b.n*100).toFixed(0)+'%':'—';
      var bRoi=b.roi;
      var srNum=b.n>0?b.w/b.n:0;
      var srColor=srNum>=0.55?'var(--pos)':srNum>=0.4?'var(--accent)':'var(--neg)';
      h+='<tr>';

    });

        else mkMap[_cbKey].profit-=1;
      } else {

        var bets=[s.bet,s.bet2,s.bet3].filter(function(b){return b&&b.trim();});
        if(!bets.length)return;
        bets.forEach(function(b){
          var pb=parseBet(b),key=_getBetSingleGroupKey(pb),lbl=_getBetSingleGroupLabel(pb);

        });
      }
    });
    for(var _k in mkMap)mkArr.push(mkMap[_k]);
    if(mkArr.length>1){
      if(_stSort.tipo.col>0){
        mkArr.sort(function(a,b){

      h+='<div class="card"><div class="cl">🎯 Analisi per Tipologia</div>';

      });
      h+='</tr></thead><tbody>';
      mkArr.forEach(function(m){
        var sr=m.n>0?(m.w/m.n*100).toFixed(0)+'%':'—';
        var roi=m.n>0?(m.profit/m.n*100).toFixed(1):null;
        var srC=m.n>0&&m.w/m.n>=0.55?'var(--pos)':m.n>0&&m.w/m.n>=0.4?'var(--accent)':'var(--neg)';
        var rC=roi&&parseFloat(roi)>=0?'var(--pos)':'var(--neg)';

        h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center">'+m.n+'</td>';
        h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center">'+m.w+'</td>';
        h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;font-weight:700;color:'+srC+'">'+sr+'</td>';
        h+='<td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;color:'+(roi?rC:'var(--muted)')+'">'+(roi?roi+'%':'—')+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }
  }
  // Spunti automatici
  var insights=[];
  if(settled.length>=5){
    var bestBand=bandData.filter(function(b){return b.n>=2;}).sort(function(a,b){return (b.n>0?b.w/b.n:0)-(a.n>0?a.w/a.n:0);})[0];
    if(bestBand&&bestBand.n>=2&&parseInt((bestBand.w/bestBand.n*100).toFixed(0))>=60)
      insights.push('💎 Fascia più redditizia: <strong>'+bestBand.label+'</strong> ('+Math.round(bestBand.w/bestBand.n*100)+'% SR).');
    var recent=settled.slice(0,5);
    var recentW=recent.filter(function(s){return s.esito==='V';}).length;
    if(recentW>=4)insights.push('🔥 Periodo positivo: '+recentW+'/5 nelle ultime 5 chiuse.');
    else if(recentW<=1)insights.push('⚠️ Periodo difficile: '+recentW+'/5 ultime. Considera puntate ridotte.');
  }
  // === SPUNTI E CONSIDERAZIONI (Enhanced) ===

  return h;
}

function parseBet(text){
  var t=(text||'').toLowerCase().trim();
  if(!t)return{label:'?',bg:'rgba(255,255,255,.07)',col:'var(--dim)'};
  // Half time FIRST (to avoid 1T Over matching as Over)
  if(/(1t|primo.?tempo|1°.?tempo|first.?half)/.test(t)){
    if(/over/.test(t)){var hM=t.match(/over[\/\s]?(\d+(?:[.,]\d)?)/);return{label:'1T Over '+(hM?hM[1]:''),bg:'rgba(62,207,142,.12)',col:'var(--pos)',cat:'1T_O'};}
    if(/under/.test(t)){var hM=t.match(/under[\/\s]?(\d+(?:[.,]\d)?)/);return{label:'1T Under '+(hM?hM[1]:''),bg:'rgba(74,158,255,.12)',col:'var(--blue)',cat:'1T_U'};}
    if(/1/.test(t))return{label:'1T 1',bg:'rgba(62,207,142,.12)',col:'var(--pos)',cat:'1T'};
    if(/x/.test(t))return{label:'1T X',bg:'rgba(255,255,255,.1)',col:'var(--muted)',cat:'1T'};
    if(/2/.test(t))return{label:'1T 2',bg:'rgba(74,158,255,.12)',col:'var(--blue)',cat:'1T'};
    return{label:'1° Tempo',bg:'rgba(180,100,255,.15)',col:'#b464ff',cat:'1T'};
  }
  // Over/Under
  var ouM=t.match(/(?:over|^o|\/o)[\/\s]?(\d+(?:[.,]\d+)?)/);if(ouM)return{label:'Over '+ouM[1].replace(',','.'),bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'OVER'};
  var uuM=t.match(/(?:under|^u|\/u)[\/\s]?(\d+(?:[.,]\d+)?)/);if(uuM)return{label:'Under '+uuM[1].replace(',','.'),bg:'rgba(74,158,255,.15)',col:'var(--blue)',cat:'UNDER'};
  // BTTS / No Gol
  if(/\b(btts|gg\b|gol.?gol|entrambe|both.?team|si$)/.test(t))return{label:'Gol Gol',bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'BTTS'};
  if(/\b(ng\b|no.?gol|no.?goal|no$)/.test(t))return{label:'No Gol',bg:'rgba(224,92,92,.15)',col:'var(--neg)',cat:'NG'};
  // Double Chance
  if(/\b(1x|dc.?1x|doppia.?1x)/.test(t))return{label:'DC 1X',bg:'rgba(245,166,35,.15)',col:'var(--accent)',cat:'DC1X'};
  if(/\b(x2\b|dc.?x2)/.test(t))return{label:'DC X2',bg:'rgba(245,166,35,.15)',col:'var(--accent)',cat:'DCX2'};
  if(/\b(12\b|dc.?12)/.test(t))return{label:'DC 12',bg:'rgba(245,166,35,.15)',col:'var(--accent)',cat:'DC12'};
  // Draw No Bet
  if(/\b(dnb|draw.?no.?bet)/.test(t)){if(/\b1\b/.test(t))return{label:'1 DNB',bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'DNB'};if(/\b2\b/.test(t))return{label:'2 DNB',bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'DNB'};}
  // Half time
  // 1T already handled above
  // Team-specific multigol: 'casa 1-3', 'ospite 2-4', 'home 1-2'
  var _mgA=t.match(/(?:casa|home|squadra\s*a)\s*(\d)-(\d)/i);
  if(_mgA)return{label:'MG Casa '+_mgA[1]+'-'+_mgA[2],bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'MG_A'};
  var _mgB=t.match(/(?:ospite|trasferta|away|squadra\s*b)\s*(\d)-(\d)/i);
  if(_mgB)return{label:'MG Ospite '+_mgB[1]+'-'+_mgB[2],bg:'rgba(100,200,255,.15)',col:'#64c8ff',cat:'MG_B'};
  // Multigol N+ (e.g. "7+ gol", "MG 5+")
  var mgOpenM=t.match(/(?:multigol|mg|goals?)?\s*(\d+)\+\s*(?:gol)?$/i);if(mgOpenM)return{label:'MG '+mgOpenM[1]+'+',bg:'rgba(180,100,255,.15)',col:'#b464ff',cat:'MG'};
  // Multigol
  var mgM=t.match(/(?:multigol|mg|goal[s]?)\s*(\d)-(\d)/)||t.match(/^(\d)-(\d)(?:\s*gol)?$/);
  if(mgM)return{label:'MG '+mgM[1]+'-'+mgM[2],bg:'rgba(180,100,255,.15)',col:'#b464ff',cat:'MG'};
  // Handicap (with optional team: 'hcp casa -1', 'hcp trasferta +1', 'hcp 2 +1')
  if(/\b(hcp|handicap|ah|asian)\b/.test(t)){var hN=t.match(/([+\-]\d+(?:[.,]\d+)?)/);var hT='';if(/\b(casa|home)\b/.test(t))hT=' Casa';else if(/\b(trasferta|away)\b/.test(t))hT=' Trasferta';else if(/(^|\s)1(\s|$)/.test(t))hT=' Casa';else if(/(^|\s)2(\s|$)/.test(t))hT=' Trasferta';return{label:'HCP'+hT+(hN?' '+hN[1]:''),bg:'rgba(245,166,35,.15)',col:'var(--accent)',cat:'HCP'};}
  // Risultato esatto (ALTRO)
  var exM=t.match(/(?:esatto|exact|score)?\s*(\d+)[:\-](\d+)$/);
  if(exM)return{label:'Esatto '+exM[1]+'-'+exM[2],bg:'rgba(255,100,150,.15)',col:'#ff6496',cat:'ESATTO'};
  // Marcatore
  if(/marcator|scorer|anytime|primo\s*gol|last\s*goal/.test(t))return{label:'Marcatore',bg:'rgba(255,100,150,.15)',col:'#ff6496',cat:'MARC'};
  // Clean sheet
  if(/clean.?sheet|porta.?inviol/.test(t))return{label:'Clean Sheet',bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'CS'};
  // Win to Nil
  if(/win.?to.?nil|to.?nil|vinc.+zero/.test(t))return{label:'Win to Nil',bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'WIN_NIL'};
  // Parziale/Finale
  if(/parziale|finale|ht.?ft|half.?time.?full/.test(t))return{label:'P/F',bg:'rgba(180,100,255,.15)',col:'#b464ff',cat:'HT_FT'};
  // Corners / Angoli
  if(/corner|angol/.test(t))return{label:'Corner',bg:'rgba(74,158,255,.15)',col:'var(--blue)',cat:'CORNER'};
  // Cartellini
  if(/cartell|card|ammoniz/.test(t))return{label:'Cartellini',bg:'rgba(255,200,0,.15)',col:'#ffc800',cat:'CARD'};
  // 1X2 (last, generic)
  if(/\b(1\b|casa|home|vittoria.?casa)/.test(t)&&!/\b(1t|1°)\b/.test(t))return{label:'1 Casa',bg:'rgba(62,207,142,.15)',col:'var(--pos)',cat:'1'};
  if(/\b(pareggio|draw|\bx\b)/.test(t))return{label:'X Pareggio',bg:'rgba(255,255,255,.1)',col:'var(--muted)',cat:'X'};
  if(/\b(2\b|trasferta|away|ospiti)/.test(t))return{label:'2 Trasferta',bg:'rgba(74,158,255,.15)',col:'var(--blue)',cat:'2'};
  return{label:'Altro',bg:'rgba(255,255,255,.07)',col:'var(--dim)',cat:'ALTRO'};
}
function getStoricoBetStats(){
  var stats={};
  STOR.forEach(function(s){
    if(!s.esito||(s.esito!=='V'&&s.esito!=='P'))return;
    if(s.tipo==='combo')return; // combo: outcome applies to whole ticket, not individual legs
    if(!s.bet||!s.bet.trim())return;
    var pb=parseBet(s.bet);
    var cat=pb.cat||'ALTRO';
    // For value-specific bets use label (e.g. 'Over 2.5') so Over 1.5 ≠ Over 2.5
    var key=(cat==='OVER'||cat==='UNDER'||cat==='MG'||cat==='HCP')?pb.label:cat;
    if(!stats[key])stats[key]={n:0,w:0};
    stats[key].n++;
    if(s.esito==='V')stats[key].w++;
  });
  return stats;
}

function calcEV(inp){
  var pv=parseFloat(inp.getAttribute('data-pv'));
  var q=parseFloat(inp.value);
  var id=inp.id;
  var el=document.getElementById(id+'_ev');
  if(!el)return;
  if(!q||q<1.01||!pv){el.textContent='—';el.style.color='var(--muted)';return;}
  var ev=(pv*q-1)*100;
  el.textContent=(ev>=0?'+':'')+ev.toFixed(1)+'%';
  el.style.color=ev>2?'var(--pos)':ev>0?'var(--accent)':ev>-3?'#f4a261':'var(--neg)';
}
function updateKelly(){
  var br=parseFloat((document.getElementById('kellyBR')||{}).value)||0;
  var half=(document.getElementById('halfK')||{}).checked!==false;
  var out=document.getElementById('kellyOut');
  if(!out)return;
  if(!br){out.textContent='Inserisci il bankroll per vedere le puntate consigliate.';out.style.color='var(--dim)';return;}
  var rows=document.querySelectorAll('#evTable tbody tr');
  var suggestions=[];
  rows.forEach(function(row){
    var inp=row.querySelector('input');
    var evEl=row.querySelector('td:nth-last-child(2)');
    var nameEl=row.querySelector('td:first-child');
    if(!inp||!evEl||evEl.textContent==='—')return;
    var ev=parseFloat(evEl.textContent);
    if(isNaN(ev)||ev<=0)return;
    var q=parseFloat(inp.value);if(!q||q<1.01)return;
    var pv=parseFloat(inp.getAttribute('data-pv'));if(!pv)return;
    var b=q-1;if(b<=0)return;
    var f=(pv*q-1)/b;
    if(half)f/=2;
    f=Math.max(0,Math.min(f,0.25));
    var stake=(br*f).toFixed(2);
    suggestions.push({name:(nameEl?nameEl.textContent:''),ev:ev.toFixed(1),f:(f*100).toFixed(1),stake:stake});
  });
  if(!suggestions.length){out.innerHTML='Nessun mercato con EV positivo.';out.style.color='var(--dim)';return;}
  var html='<div style="font-weight:700;color:var(--text);margin-bottom:4px">Puntate'+(half?' Half-Kelly':' Full Kelly')+':</div>';
  suggestions.forEach(function(s){
    html+='<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px">';
    html+='<span style="flex:1">'+s.name+'</span>';
    html+='<span style="color:var(--pos)">+'+s.ev+'%</span>';
    html+='<span style="background:var(--accent);color:#0c0c12;padding:2px 8px;border-radius:5px;font-weight:700">€'+s.stake+'</span>';
    html+='</div>';
  });
  out.innerHTML=html;out.style.color='var(--text)';
}

      var _cem=AN&&AN.customEvMkts||[];

      // Custom combos
      var _cco=AN&&AN.customEvCombos||[];

        if(!sv)continue;

    if(AT==='input')renderInput();
    else if(AT==='analisi')renderAnalisi();
    else if(AT==='storico')renderStorico();
  }catch(e){
    var el=document.getElementById('ct-'+AT)||document.body;
    el.innerHTML='<div style="padding:16px;color:#e05c5c;font-family:monospace;font-size:11px;white-space:pre-wrap;background:#1a0808;border-radius:8px;margin:14px">Errore: '+e.message+'</div>';
  }
}
(function(){if('serviceWorker' in navigator&&!navigator.standalone)window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});})();
load();draw();
</script>
</body>
</html>
